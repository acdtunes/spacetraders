flight_modes:
  CRUISE:
    time_multiplier: 31
    fuel_rate: 1.0
  DRIFT:
    time_multiplier: 26
    fuel_rate: 0.003
  BURN:
    time_multiplier: 15
    fuel_rate: 2.0
  STEALTH:
    time_multiplier: 50
    fuel_rate: 1.0

fuel_safety_margin: 0.1
refuel_time_seconds: 5

solver:
  time_limit_ms: 5000
  first_solution_strategy: PATH_CHEAPEST_ARC
  local_search_metaheuristic: GUIDED_LOCAL_SEARCH
  guided_local_search_lambda: 0.1

validation:
  max_deviation_percent: 5.0
  check_interval_hours: 24
  pause_on_failure: true
