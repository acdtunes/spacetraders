syntax = "proto3";

package daemon;

option go_package = "github.com/andrescamacho/spacetraders-go/pkg/proto/daemon";

// DaemonService defines the gRPC API for CLI <-> Daemon communication
// Communication occurs over Unix domain socket for security and performance
service DaemonService {
  // NavigateShip initiates a ship navigation operation as a background container
  rpc NavigateShip(NavigateShipRequest) returns (NavigateShipResponse);

  // RouteShip initiates a cross-system point-to-point travel operation as a
  // background container (sp-6hjw). Unlike NavigateShip (in-system only), it reuses
  // the multi-jump travel machinery so a hull can reach a waypoint in any system.
  rpc RouteShip(RouteShipRequest) returns (RouteShipResponse);

  // DockShip docks a ship at its current location
  rpc DockShip(DockShipRequest) returns (DockShipResponse);

  // OrbitShip puts a ship into orbit from docked position
  rpc OrbitShip(OrbitShipRequest) returns (OrbitShipResponse);

  // RefuelShip refuels a ship at its current location
  rpc RefuelShip(RefuelShipRequest) returns (RefuelShipResponse);

  // JumpShip executes a jump to a different star system via jump gate
  rpc JumpShip(JumpShipRequest) returns (JumpShipResponse);

  // InstallModule installs a module (e.g. MODULE_CARGO_HOLD_III) from the ship's
  // cargo onto the ship. Single-writer daemon op (RULING #3): atomically claims
  // the hull, verifies the module is in cargo, gates the modification fee on the
  // working-capital floor (RULING #4), docks, installs, and persists the ship's
  // new cargo capacity. Synchronous — returns the post-install capacity + fee.
  rpc InstallModule(InstallModuleRequest) returns (InstallModuleResponse);

  // RemoveModule removes an installed module from the ship back into its cargo.
  // Mirror image of InstallModule (same claim/fee/persist guarantees).
  rpc RemoveModule(RemoveModuleRequest) returns (RemoveModuleResponse);

  // ListShipModules lists the modules currently installed on a ship (read-only,
  // no claim).
  rpc ListShipModules(ListShipModulesRequest) returns (ListShipModulesResponse);

  // BatchContractWorkflow executes batch contract workflow operations
  rpc BatchContractWorkflow(BatchContractWorkflowRequest) returns (BatchContractWorkflowResponse);

  // ContractFleetCoordinator manages a pool of ships for continuous contract execution
  rpc ContractFleetCoordinator(ContractFleetCoordinatorRequest) returns (ContractFleetCoordinatorResponse);

  // ScoutTour executes market scouting tour operations (single ship)
  rpc ScoutTour(ScoutTourRequest) returns (ScoutTourResponse);

  // ScoutMarkets orchestrates fleet deployment for market scouting (multi-ship with VRP)
  rpc ScoutMarkets(ScoutMarketsRequest) returns (ScoutMarketsResponse);

  // AssignScoutingFleet auto-discovers probe/satellite ships and assigns them to scout markets
  rpc AssignScoutingFleet(AssignScoutingFleetRequest) returns (AssignScoutingFleetResponse);

  // ScoutPostCoordinator starts the standing scout-post coordinator (sp-cxpq)
  rpc ScoutPostCoordinator(ScoutPostCoordinatorRequest) returns (ScoutPostCoordinatorResponse);

  // TradeFleetCoordinator starts the standing trade-fleet coordinator (sp-1278):
  // keeps continuous tours alive on 'trade'-dedicated hulls, relaunching on honest
  // exit after a cooldown. Retires the captain hand-relaunch loop.
  rpc TradeFleetCoordinator(TradeFleetCoordinatorRequest) returns (TradeFleetCoordinatorResponse);

  // SitingCoordinator starts the standing factory-siting coordinator (sp-vdld): the
  // "brain" that automates factory discovery/placement/capacity — each slow tick it
  // scans candidate sites, scores them by branchPL, maintains the top-K portfolio,
  // launches/retires goods_factory chains through the guard stack, and emits scout-demand.
  rpc SitingCoordinator(SitingCoordinatorRequest) returns (SitingCoordinatorResponse);

  // FleetAutosizerCoordinator starts the standing fleet capacity autosizer (sp-1txd): sizes
  // the hull pool to demand and auto-buys hulls (lights to factory demand, heavies to trade
  // demand) behind the full fail-closed money-guard stack. LIVE BY DEFAULT once launched.
  rpc FleetAutosizerCoordinator(FleetAutosizerCoordinatorRequest) returns (FleetAutosizerCoordinatorResponse);

  // BootstrapCoordinator starts the standing captain bootstrap coordinator (sp-3nbe): a
  // reconciler that drives a cold agent through the cold-start arc to the jump gate. Slice 1
  // ships the DATA phase (probes → 3, scout every market). LIVE BY DEFAULT once launched.
  rpc BootstrapCoordinator(BootstrapCoordinatorRequest) returns (BootstrapCoordinatorResponse);

  // CapacityReconcilerCoordinator starts the standing capacity reconciler (st-7zk): drives
  // the contract-delivery machine's actual topology toward the computed desired topology
  // (SENSE → PLAN → DIFF → GOVERN → CONVERGE), capex-paced, captain/DISABLED-gated every
  // tick. EXPLICIT START ONLY — never boot-standing-armed (deploy-inert foundation).
  rpc CapacityReconcilerCoordinator(CapacityReconcilerCoordinatorRequest) returns (CapacityReconcilerCoordinatorResponse);

  // AutoOutfitCoordinator starts the standing guarded auto-outfit coordinator (sp-buyd):
  // the module analogue of hull acquisition. Each tick it measures per-hull cargo
  // saturation from tour_leg_telemetry, catalogs available modules, and installs the
  // highest-marginal-value upgrade behind a fail-closed money/ceiling/cap guard stack.
  // EXPLICIT START ONLY — never boot-standing-armed (deploy-inert).
  rpc AutoOutfitCoordinator(AutoOutfitCoordinatorRequest) returns (AutoOutfitCoordinatorResponse);

  // FrontierExpansionCoordinator starts the standing frontier expansion coordinator (sp-8w89)
  rpc FrontierExpansionCoordinator(FrontierExpansionCoordinatorRequest) returns (FrontierExpansionCoordinatorResponse);

  // ShipyardBackfillCoordinator starts the standing shipyard-backfill sweep (sp-s1ek — the
  // launch verb for the sp-rhju engine): each tick it backfills the charted-but-unscanned
  // shipyard systems (the blind spots), deeper-first, bounded by a per-cycle dispatch cap and
  // idle probe supply. EXPLICIT START ONLY — never boot-standing-armed (deploy-inert).
  rpc ShipyardBackfillCoordinator(ShipyardBackfillCoordinatorRequest) returns (ShipyardBackfillCoordinatorResponse);

  // WorkerRebalancerCoordinator starts the standing worker-rebalancer coordinator (sp-f5pr):
  // ferries idle light-haulers cross-system to worker-starved factory systems. All tuning
  // lives in config.yaml [worker_rebalancer]; this request names the player/agent + dry_run.
  rpc WorkerRebalancerCoordinator(WorkerRebalancerCoordinatorRequest) returns (WorkerRebalancerCoordinatorResponse);

  // AddScoutPost adds or updates a desired-state scout post for a system
  rpc AddScoutPost(AddScoutPostRequest) returns (ScoutPostResponse);

  // RemoveScoutPost removes a scout post for a system
  rpc RemoveScoutPost(RemoveScoutPostRequest) returns (RemoveScoutPostResponse);

  // ListScoutPosts returns the active scout posts for a player
  rpc ListScoutPosts(ListScoutPostsRequest) returns (ListScoutPostsResponse);

  // ListContainers returns all running background containers
  rpc ListContainers(ListContainersRequest) returns (ListContainersResponse);

  // GetContainer returns detailed information about a specific container
  rpc GetContainer(GetContainerRequest) returns (GetContainerResponse);

  // StopContainer stops a running background container
  rpc StopContainer(StopContainerRequest) returns (StopContainerResponse);

  // GetContainerLogs retrieves logs from a container
  rpc GetContainerLogs(GetContainerLogsRequest) returns (GetContainerLogsResponse);

  // HealthCheck verifies daemon is running and responsive
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);

  // GetAPIBudget returns API request-budget observability (sp-51ti):
  // per-hull req/s, global utilization vs the rate ceiling (429 rate, poll
  // cadence share of the budget, headroom), and the duty-cycle KPI
  // (ship-hours earning/day per hull).
  rpc GetAPIBudget(GetAPIBudgetRequest) returns (GetAPIBudgetResponse);

  // ListShips returns all ships for a player
  rpc ListShips(ListShipsRequest) returns (ListShipsResponse);

  // GetShip returns detailed information about a specific ship
  rpc GetShip(GetShipRequest) returns (GetShipResponse);

  // RefreshShip forces a resync of a ship from the API, overwriting the cache
  rpc RefreshShip(RefreshShipRequest) returns (RefreshShipResponse);

  // ReserveShip reserves a ship for the captain's direct manual use, hiding
  // it from every coordinator's assignment discovery (sp-i1ku)
  rpc ReserveShip(ReserveShipRequest) returns (ReserveShipResponse);

  // ReleaseShip clears a captain reservation, returning the ship to idle so
  // normal coordinator discovery can claim it again (sp-i1ku)
  rpc ReleaseShip(ReleaseShipRequest) returns (ReleaseShipResponse);

  // AssignShipFleet dedicates a ship to a named fleet, making it exclusive
  // to that fleet's coordinator (sp-l7h2)
  rpc AssignShipFleet(AssignShipFleetRequest) returns (AssignShipFleetResponse);

  // UnassignShipFleet clears a ship's fleet dedication, returning it to the
  // general pool (sp-l7h2)
  rpc UnassignShipFleet(UnassignShipFleetRequest) returns (UnassignShipFleetResponse);

  // ListFleets lists every dedicated fleet and its member ships (sp-l7h2)
  rpc ListFleets(ListFleetsRequest) returns (ListFleetsResponse);

  // FleetHub adds or removes a standby-station ("hub") waypoint on a RUNNING
  // operation's coordinator, live, with no container restart (sp-jcke). The
  // coordinator reads its standby set from its own container config every
  // discovery pass, so a hub added draws idle dedicated hulls toward it and a
  // hub removed re-homes its hulls to the remaining set on the next tick. The
  // daemon is the sole writer of the persisted set (RULINGS #3).
  rpc FleetHub(FleetHubRequest) returns (FleetHubResponse);

  // ListWaypoints lists the waypoints of a system from the daemon's waypoint cache
  rpc ListWaypoints(ListWaypointsRequest) returns (ListWaypointsResponse);

  // GetWaypoint returns the detail of a single waypoint
  rpc GetWaypoint(GetWaypointRequest) returns (GetWaypointResponse);

  // PurchaseShip purchases a single ship from a shipyard
  rpc PurchaseShip(PurchaseShipRequest) returns (PurchaseShipResponse);

  // BatchPurchaseShips purchases multiple ships from a shipyard as a background operation
  rpc BatchPurchaseShips(BatchPurchaseShipsRequest) returns (BatchPurchaseShipsResponse);

  // GetShipyardListings retrieves available ships at a shipyard
  rpc GetShipyardListings(GetShipyardListingsRequest) returns (GetShipyardListingsResponse);

  // StartGoodsFactory initiates automated goods production using supply chain fabrication
  rpc StartGoodsFactory(StartGoodsFactoryRequest) returns (StartGoodsFactoryResponse);

  // StopGoodsFactory stops a running goods factory operation
  rpc StopGoodsFactory(StopGoodsFactoryRequest) returns (StopGoodsFactoryResponse);

  // FactoryWorkerCap sets the live concurrent-hull cap on a RUNNING goods factory
  // operation (sp-ev0n). The coordinator re-reads it each production pass and
  // converges its fan-out to N with no container restart; the cap persists across
  // restarts.
  rpc FactoryWorkerCap(FactoryWorkerCapRequest) returns (FactoryWorkerCapResponse);

  // TuneContainerConfig sets (or, with value 0, reverts) ONE live knob on a
  // RUNNING/PENDING container's persisted config (sp-vwek) — the generic runtime
  // tune verb generalizing FactoryWorkerCap. The tune is validated against a
  // static bounds registry (out-of-bounds/unknown keys rejected before any
  // write), lands on the coordinator's NEXT reconcile tick with no restart,
  // survives daemon restarts (the config column is the recovery source), and
  // emits a config.tuned captain audit event on every effective change.
  rpc TuneContainerConfig(TuneContainerConfigRequest) returns (TuneContainerConfigResponse);

  // ShowTunableConfig lists a container's live-tunable knobs with their effective
  // values, sources (live-config vs default), and bounds (sp-vwek `tune --show`,
  // minimal coverage — the migrated engines only; full coverage is sp-kv27).
  rpc ShowTunableConfig(ShowTunableConfigRequest) returns (ShowTunableConfigResponse);

  // GetFrontierStatus returns the frontier expansion coordinator's live state in one
  // view (sp-pvw3): the effective discovery/scan split + degradation note, the discovery
  // frontier depth, the honest dark-market backlog (charted markets with no/stale price
  // data), probe allocation, the last probe buy, and the current fail-closed blockers.
  rpc GetFrontierStatus(GetFrontierStatusRequest) returns (GetFrontierStatusResponse);

  // GetFactoryStatus retrieves status and progress of a goods factory
  rpc GetFactoryStatus(GetFactoryStatusRequest) returns (GetFactoryStatusResponse);

  // ScanArbitrageOpportunities scans markets for profitable arbitrage opportunities
  rpc ScanArbitrageOpportunities(ScanArbitrageOpportunitiesRequest) returns (ScanArbitrageOpportunitiesResponse);

  // StartArbitrageCoordinator initiates automated arbitrage trading operations
  rpc StartArbitrageCoordinator(StartArbitrageCoordinatorRequest) returns (StartArbitrageCoordinatorResponse);

  // JettisonCargo jettisons cargo from a ship
  rpc JettisonCargo(JettisonCargoRequest) returns (JettisonCargoResponse);

  // GasExtractionOperation starts a gas extraction operation with siphon and transport ships
  rpc GasExtractionOperation(GasExtractionOperationRequest) returns (GasExtractionOperationResponse);

  // StartTradeRoute launches a single-hull pure-arbitrage circuit as a recovery-safe daemon container
  rpc StartTradeRoute(StartTradeRouteRequest) returns (StartTradeRouteResponse);

  // StartWarehouse launches a passive inventory warehouse (sp-dchv Lane B) on a dedicated
  // storage hull parked at a home waypoint, as a recovery-safe daemon container.
  rpc StartWarehouse(StartWarehouseRequest) returns (StartWarehouseResponse);

  // StartArbRun launches a ONE-SHOT, captain-directed, guarded arbitrage run (sp-p4ua):
  // buy a named good at a source waypoint, route (cross-gate) to a destination, sell once, stop.
  rpc StartArbRun(StartArbRunRequest) returns (StartArbRunResponse);

  // StartTourRun launches a ONE-SHOT, captain-directed, guarded multi-hop trade tour
  // (sp-1ek0): plan a depth-aware tour for one idle hull, fly it leg by leg with prices
  // re-verified live, re-plan on drift, and stop.
  rpc StartTourRun(StartTourRunRequest) returns (StartTourRunResponse);

  // StartStocker launches the STOCKER LOOP (sp-zdwg): a dedicated hull that fills a home
  // warehouse the tours rationally won't (sp-dchv). Each round-trip it need-ranks the
  // most-needed stock good, buys it at the cheapest foreign market (live-verified,
  // fail-closed), hauls home, and deposits — until nothing is left to stock.
  rpc StartStocker(StartStockerRequest) returns (StartStockerResponse);

  // StartConstructionPipeline starts a pipeline to supply materials to a construction site
  rpc StartConstructionPipeline(StartConstructionPipelineRequest) returns (StartConstructionPipelineResponse);

  // GetConstructionStatus retrieves the status of a construction site
  rpc GetConstructionStatus(GetConstructionStatusRequest) returns (GetConstructionStatusResponse);

  // StopConstructionPipeline cancels the active construction pipeline for a site (sp-yzrv)
  rpc StopConstructionPipeline(StopConstructionPipelineRequest) returns (StopConstructionPipelineResponse);

  // ConstructionGoodOverride sets or clears one good's per-good buy-gating override (the sp-sdyo
  // override map) on a RUNNING construction pipeline live, with no restart (sp-pdb3). The
  // coordinator / task activator re-read the persisted overrides on their next discovery pass.
  rpc ConstructionGoodOverride(ConstructionGoodOverrideRequest) returns (ConstructionGoodOverrideResponse);

  // --- Contract depot management (sp-u9xa) ---
  // The daemon is the single writer of contract-depot topology; every mutation is durable
  // the instant it returns (through the application Store into the DB), so a granular edit
  // needs no restart to take effect. ApplyDepotTopology is the declarative bulk apply; the
  // rest are granular live ops.
  rpc ApplyDepotTopology(ApplyDepotTopologyRequest) returns (ApplyDepotTopologyResponse);
  rpc AddDepot(AddDepotRequest) returns (AddDepotResponse);
  rpc RemoveDepot(RemoveDepotRequest) returns (RemoveDepotResponse);
  rpc AddDepotElement(AddDepotElementRequest) returns (DepotElementResponse);
  rpc RemoveDepotElement(RemoveDepotElementRequest) returns (DepotElementResponse);
  rpc PlaceDepotElement(PlaceDepotElementRequest) returns (DepotElementResponse);
  rpc ListDepots(ListDepotsRequest) returns (ListDepotsResponse);
  // Lifecycle (sp-38xc): StartDepot persists ONE depot's topology AND launches its
  // coordinators in one shot (live activation, no restart; idle-idempotent so a re-run
  // never double-launches). StopDepot tears down that depot's running coordinators.
  rpc StartDepot(StartDepotRequest) returns (StartDepotResponse);
  rpc StopDepot(StopDepotRequest) returns (StopDepotResponse);
}

// NavigateShipRequest initiates ship navigation
message NavigateShipRequest {
  // Ship symbol to navigate (e.g., "AGENT-1")
  string ship_symbol = 1;

  // Destination waypoint symbol (e.g., "X1-GZ7-B1")
  string destination = 2;

  // Player ID for authentication
  int32 player_id = 3;

  // Optional agent symbol (alternative to player_id)
  optional string agent_symbol = 4;
}

// NavigateShipResponse returns container ID for tracking
message NavigateShipResponse {
  // Container ID for tracking the navigation operation
  string container_id = 1;

  // Ship symbol
  string ship_symbol = 2;

  // Destination waypoint
  string destination = 3;

  // Initial status
  string status = 4;

  // Estimated total travel time in seconds
  int32 estimated_time_seconds = 5;
}

// RouteShipRequest initiates cross-system point-to-point travel (sp-6hjw)
message RouteShipRequest {
  // Ship symbol to route (e.g., "ENDURANCE-7")
  string ship_symbol = 1;

  // Destination waypoint in any reachable system (e.g., "X1-JP61-B1")
  string destination = 2;

  // Player ID for authentication
  int32 player_id = 3;

  // Optional agent symbol (alternative to player_id)
  optional string agent_symbol = 4;
}

// RouteShipResponse returns container ID for tracking
message RouteShipResponse {
  // Container ID for tracking the route operation
  string container_id = 1;

  // Ship symbol
  string ship_symbol = 2;

  // Destination waypoint
  string destination = 3;

  // Initial status
  string status = 4;
}

// DockShipRequest initiates ship docking
message DockShipRequest {
  string ship_symbol = 1;
  int32 player_id = 2;
  optional string agent_symbol = 3;
}

message DockShipResponse {
  string container_id = 1;
  string ship_symbol = 2;
  string status = 3;
}

// OrbitShipRequest initiates ship orbit
message OrbitShipRequest {
  string ship_symbol = 1;
  int32 player_id = 2;
  optional string agent_symbol = 3;
}

message OrbitShipResponse {
  string container_id = 1;
  string ship_symbol = 2;
  string status = 3;
}

// RefuelShipRequest initiates ship refueling
message RefuelShipRequest {
  string ship_symbol = 1;
  int32 player_id = 2;
  optional string agent_symbol = 3;

  // Optional: specific fuel units to purchase. Omit for full tank.
  optional int32 units = 4;
}

message RefuelShipResponse {
  string container_id = 1;
  string ship_symbol = 2;
  int32 fuel_added = 3;
  int32 credits_cost = 4;
  string status = 5;
}

// JumpShipRequest initiates a jump to another system
message JumpShipRequest {
  string ship_symbol = 1;
  string destination_system = 2;
  int32 player_id = 3;
  optional string agent_symbol = 4;
}

message JumpShipResponse {
  bool success = 1;
  bool navigated_to_gate = 2;
  string jump_gate_symbol = 3;
  string destination_system = 4;
  int32 cooldown_seconds = 5;
  string message = 6;
  string error = 7;
}

// ShipModuleInfo describes a single ship module (installed or listed).
message ShipModuleInfo {
  string symbol = 1;
  string name = 2;
  // capacity is the bonus the module grants (e.g. cargo hold size); 0 for
  // modules that grant no capacity.
  int32 capacity = 3;
  int32 range = 4;
  // power, crew, and slots are the module's own install requirements
  // (sp-el60) - what installing it draws from the ship's reactor power
  // budget, crew capacity, and module-slot budget respectively.
  int32 power = 5;
  int32 crew = 6;
  int32 slots = 7;
}

// ModuleFeasibility reports whether a named candidate module can be
// installed on a ship given its current power/slot/crew budget, computed
// offline from cached ship state - no live trial-and-error install required
// (sp-el60). Populated on ListShipModulesResponse only when the request
// carried a candidate_symbol.
message ModuleFeasibility {
  string candidate_symbol = 1;
  // can_install is true only when requirements_known is true and
  // power_short, slot_short, and crew_short are all 0. A candidate whose
  // requirements could not be resolved from a real data source always
  // reports can_install = false (sp-el60 acceptance fix) - there is no
  // zero-filled-requirements path that can produce a false "fits" verdict.
  bool can_install = 2;
  int32 power_short = 3;
  int32 slot_short = 4;
  int32 crew_short = 5;
  // requirements_known is true only when the candidate's own power/crew/slot
  // requirements were actually resolved - from another ship in the fleet
  // that has candidate_symbol installed, since there is no catalog of
  // unowned module specs anywhere (sp-el60 acceptance fix). When false, the
  // requirements_power/crew/slots fields below are unset/zero and MUST be
  // presented to the user as "unknown", never as a real zero-cost spec, and
  // can_install is always false regardless of the ship's free budget.
  bool requirements_known = 6;
  int32 requirements_power = 7;
  int32 requirements_crew = 8;
  int32 requirements_slots = 9;
}

// InstallModuleRequest installs a module from the ship's cargo onto the ship.
message InstallModuleRequest {
  string ship_symbol = 1;
  string module_symbol = 2;
  int32 player_id = 3;
  optional string agent_symbol = 4;
}

message InstallModuleResponse {
  bool success = 1;
  string ship_symbol = 2;
  string module_symbol = 3;
  // cargo_capacity is the ship's cargo hold capacity AFTER the install — the
  // whole point of a CARGO_HOLD upgrade.
  int32 cargo_capacity = 4;
  // fee is the shipyard modification fee charged for the install.
  int32 fee = 5;
  // modules is the ship's full installed-module list after the install.
  repeated ShipModuleInfo modules = 6;
  string message = 7;
  string error = 8;
}

// RemoveModuleRequest removes an installed module from the ship back into cargo.
message RemoveModuleRequest {
  string ship_symbol = 1;
  string module_symbol = 2;
  int32 player_id = 3;
  optional string agent_symbol = 4;
}

message RemoveModuleResponse {
  bool success = 1;
  string ship_symbol = 2;
  string module_symbol = 3;
  // cargo_capacity is the ship's cargo hold capacity AFTER the removal.
  int32 cargo_capacity = 4;
  int32 fee = 5;
  repeated ShipModuleInfo modules = 6;
  string message = 7;
  string error = 8;
}

// ListShipModulesRequest lists the modules installed on a ship.
message ListShipModulesRequest {
  string ship_symbol = 1;
  int32 player_id = 2;
  optional string agent_symbol = 3;
  // candidate_symbol, when set, requests an offline feasibility check for a
  // not-yet-installed module against this ship's current power/slot/crew
  // budget (sp-el60).
  optional string candidate_symbol = 4;
  // candidate_power/crew/slots are DEPRECATED and ignored server-side as of
  // the sp-el60 acceptance fix: a caller-supplied value silently defaulted
  // to 0 when omitted, which trivially satisfied every budget check and
  // misreported CAN-INSTALL. The candidate's requirements are now always
  // resolved server-side from another ship in the fleet that has
  // candidate_symbol installed (see ModuleFeasibility.requirements_known).
  // Fields kept, unread, for wire compatibility with older clients.
  optional int32 candidate_power = 5;
  optional int32 candidate_crew = 6;
  optional int32 candidate_slots = 7;
}

message ListShipModulesResponse {
  string ship_symbol = 1;
  repeated ShipModuleInfo modules = 2;
  string error = 3;
  // Fields 4-12 are the ship's power/slot/crew budget summary (sp-el60),
  // computed offline from cached ship state - reactors, frames, and crew
  // capacity have no swap endpoint, so these budgets are permanent per hull.
  int32 reactor_power_output = 4;
  int32 power_used = 5;
  int32 module_slots = 6;
  int32 module_slots_used = 7;
  int32 mounting_points = 8;
  int32 mounting_points_used = 9;
  int32 crew_current = 10;
  int32 crew_required = 11;
  int32 crew_capacity = 12;
  // feasibility is populated only when the request carried a candidate_symbol.
  optional ModuleFeasibility feasibility = 13;
}

// BatchContractWorkflowRequest initiates batch contract workflow
message BatchContractWorkflowRequest {
  string ship_symbol = 1;
  int32 iterations = 2;
  int32 player_id = 3;
  optional string agent_symbol = 4;
}

message BatchContractWorkflowResponse {
  string container_id = 1;
  string ship_symbol = 2;
  int32 iterations = 3;
  string status = 4;
}

// ContractFleetCoordinatorRequest initiates contract fleet coordination
// Uses all available idle light hauler ships (no pre-assignment needed)
message ContractFleetCoordinatorRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  // dedicated_ships (sp-snmb): operator-supplied --dedicated-ships list.
  // Ships on this list are claim-filtered from every other coordinator's
  // discovery pool and reserved exclusively for this contract coordinator.
  // Optional - empty/absent means no dedicated fleet is configured.
  repeated string dedicated_ships = 3;
  // standby_stations (sp-snmb): operator-supplied --standby-stations list.
  // An idle dedicated ship homes to the nearest of these waypoints instead
  // of being balanced to a market. Optional - empty/absent disables homing.
  repeated string standby_stations = 4;
}

message ContractFleetCoordinatorResponse {
  string container_id = 1;
  string status = 2;
}

// ScoutTourRequest initiates market scouting tour
message ScoutTourRequest {
  string ship_symbol = 1;
  repeated string markets = 2;
  int32 iterations = 3;
  int32 player_id = 4;
  optional string agent_symbol = 5;
}

message ScoutTourResponse {
  string container_id = 1;
  string ship_symbol = 2;
  repeated string markets = 3;
  int32 iterations = 4;
  string status = 5;
}

// ScoutPost is one desired-state post (sp-cxpq): keep system_symbol scanned to
// within freshness_seconds, via kind ("standing" or "sweep_once"). assigned_hull
// and tour_container_id are the PRIMARY slot (empty if unmanned). hulls is the probe
// budget N (sp-enry): the system is toured by N probes over N disjoint partitions;
// manned_count is how many of those N slots currently have a hull.
message ScoutPost {
  string system_symbol = 1;
  int32 freshness_seconds = 2;
  string kind = 3;
  string assigned_hull = 4;
  string tour_container_id = 5;
  int32 hulls = 6;
  int32 manned_count = 7;
}

// ScoutPostCoordinatorRequest starts the standing scout-post coordinator.
message ScoutPostCoordinatorRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  // tick_interval_secs is the reconcile cadence; 0 uses the coordinator default.
  int32 tick_interval_secs = 3;
}

message ScoutPostCoordinatorResponse {
  string container_id = 1;
  string status = 2;
}

// TradeFleetCoordinatorRequest starts the standing trade-fleet coordinator (sp-1278).
// All tuning lives in config.yaml's [trade_fleet] section (resolved live on every
// build); this request only names the player/agent.
message TradeFleetCoordinatorRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
}

message TradeFleetCoordinatorResponse {
  string container_id = 1;
  string status = 2;
}

// SitingCoordinatorRequest starts the standing factory-siting coordinator (sp-vdld).
// All tuning lives in config.yaml's [manufacturing.siting] section (resolved live on every
// build); this request only names the player/agent.
message SitingCoordinatorRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
}

message SitingCoordinatorResponse {
  string container_id = 1;
  string status = 2;
}

// FleetAutosizerCoordinatorRequest starts the standing fleet capacity autosizer (sp-1txd).
// All tuning lives in config.yaml's [fleet_autosizer] section (resolved live on every build);
// this request only names the player/agent.
message FleetAutosizerCoordinatorRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
}

message FleetAutosizerCoordinatorResponse {
  string container_id = 1;
  string status = 2;
}

// BootstrapCoordinatorRequest starts the standing captain bootstrap coordinator (sp-3nbe).
// All tuning lives in config.yaml's [bootstrap] section (resolved live on every build); this
// request only names the player/agent and an optional dry-run override.
message BootstrapCoordinatorRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  bool dry_run = 3;  // observe + log decisions, act on nothing (overrides config when true)
}

message BootstrapCoordinatorResponse {
  string container_id = 1;
  string status = 2;
}

// CapacityReconcilerCoordinatorRequest starts the standing capacity reconciler (st-7zk).
// All calibration lives in config.yaml's [capacity_reconciler] section (resolved live on
// every build); this request names the player/agent and an optional dry-run override.
message CapacityReconcilerCoordinatorRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  bool dry_run = 3;  // observe + log every decision, actuate nothing (recommended first-start posture)
}

message CapacityReconcilerCoordinatorResponse {
  string container_id = 1;
  string status = 2;
}

// AutoOutfitCoordinatorRequest starts the standing guarded auto-outfit coordinator
// (sp-buyd). All calibration is live-tunable via `tune --operation autooutfit`; this
// request names the player/agent and an optional dry-run override.
message AutoOutfitCoordinatorRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  bool dry_run = 3;  // observe + log every WOULD-install, actuate nothing (recommended first-start posture)
}

message AutoOutfitCoordinatorResponse {
  string container_id = 1;
  string status = 2;
}

// FrontierExpansionCoordinator launch knobs (sp-8w89). All optional; a 0/false value
// uses the coordinator's documented default (RULINGS #5).
message FrontierExpansionCoordinatorRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  int32 tick_interval_secs = 3;      // reconcile cadence; 0 = default
  bool dry_run = 4;                  // log decisions, buy/declare nothing
  int32 max_probe_fleet = 5;         // total satellite cap; 0 = default
  int32 max_spend_per_cycle = 6;     // probe spend cap in the trailing window; 0 = default
  int32 purchase_cooldown_secs = 7;  // min seconds between probe buys; 0 = default
  int32 expansion_max_hops = 8;      // gate-graph reach for the queue; 0 = default
}
message FrontierExpansionCoordinatorResponse {
  string container_id = 1;
  string status = 2;
}

// ShipyardBackfillCoordinator launch knobs (sp-s1ek). All optional; a 0 value uses the
// coordinator's documented default (RULINGS #5). The engine has no dry-run mode, so there
// is no dry_run field.
message ShipyardBackfillCoordinatorRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  int32 tick_interval_secs = 3;        // reconcile cadence; 0 = default
  int32 max_dispatches_per_cycle = 4;  // per-cycle sweep-once declaration cap; 0 = default
}
message ShipyardBackfillCoordinatorResponse {
  string container_id = 1;
  string status = 2;
}

// WorkerRebalancerCoordinatorRequest starts the standing worker-rebalancer coordinator
// (sp-f5pr). All tuning lives in config.yaml's [worker_rebalancer] section (resolved live
// on every build); this request only names the player/agent and the dry-run launch flag.
message WorkerRebalancerCoordinatorRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  bool dry_run = 3; // decide + log the ferry it would dispatch, but ferry nothing
}

message WorkerRebalancerCoordinatorResponse {
  string container_id = 1;
  string status = 2;
}

// AddScoutPostRequest adds or updates a post. An existing post's live assignment
// is preserved; freshness, kind, and the hull budget change. hulls is the probe
// budget N (sp-enry); 0 defaults to 1 (single-hull, the pre-enry behavior).
message AddScoutPostRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  string system_symbol = 3;
  int32 freshness_seconds = 4;
  string kind = 5;
  int32 hulls = 6;
}

message ScoutPostResponse {
  ScoutPost post = 1;
}

// RemoveScoutPostRequest removes a post and releases its hull if manned.
message RemoveScoutPostRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  string system_symbol = 3;
}

message RemoveScoutPostResponse {
  string status = 1;
}

message ListScoutPostsRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
}

message ListScoutPostsResponse {
  repeated ScoutPost posts = 1;
}

// ScoutMarketsRequest initiates fleet market scouting with VRP optimization
message ScoutMarketsRequest {
  repeated string ship_symbols = 1;
  string system_symbol = 2;
  repeated string markets = 3;
  int32 iterations = 4;
  int32 player_id = 5;
  optional string agent_symbol = 6;
}

message ScoutMarketsResponse {
  repeated string container_ids = 1;
  map<string, MarketAssignment> assignments = 2;
  repeated string reused_containers = 3;
}

// MarketAssignment represents markets assigned to a ship
message MarketAssignment {
  repeated string markets = 1;
}

// AssignScoutingFleetRequest auto-discovers and assigns scouting fleet
message AssignScoutingFleetRequest {
  string system_symbol = 1;
  int32 player_id = 2;
  optional string agent_symbol = 3;
}

message AssignScoutingFleetResponse {
  string container_id = 1; // Fleet-assignment container ID
}

// ListContainersRequest lists all containers
message ListContainersRequest {
  // Optional filter by player ID
  optional int32 player_id = 1;

  // Optional filter by container status
  optional string status = 2;
}

message ListContainersResponse {
  repeated ContainerInfo containers = 1;
}

message ContainerInfo {
  string container_id = 1;
  string container_type = 2;
  string status = 3;
  int32 player_id = 4;
  string created_at = 5;
  string updated_at = 6;

  // Iteration tracking for loops
  int32 current_iteration = 7;
  int32 max_iterations = 8;

  // Restart tracking
  int32 restart_count = 9;

  // Parent container ID (null for root containers)
  optional string parent_container_id = 10;
}

// GetContainerRequest retrieves container details
message GetContainerRequest {
  string container_id = 1;
}

message GetContainerResponse {
  ContainerInfo container = 1;
  string metadata = 2; // JSON-encoded metadata
}

// StopContainerRequest stops a container
message StopContainerRequest {
  string container_id = 1;
}

message StopContainerResponse {
  string container_id = 1;
  string status = 2;
  string message = 3;
}

// GetContainerLogsRequest retrieves container logs
message GetContainerLogsRequest {
  string container_id = 1;

  // Optional limit on number of log entries
  optional int32 limit = 2;

  // Optional filter by log level (INFO, WARNING, ERROR, DEBUG)
  optional string level = 3;
}

message GetContainerLogsResponse {
  repeated LogEntry logs = 1;
}

message LogEntry {
  string timestamp = 1;
  string level = 2;
  string message = 3;
  string metadata = 4; // JSON-encoded metadata
}

// HealthCheckRequest verifies daemon status
message HealthCheckRequest {
  // Empty for now
}

message HealthCheckResponse {
  string status = 1; // "ok" or error message
  string version = 2;
  int32 active_containers = 3;
}

// GetAPIBudgetRequest requests a snapshot of API request-budget
// observability (sp-51ti). Empty for now.
message GetAPIBudgetRequest {
}

// APIBudgetHullStats is one hull's share of the request budget within a
// report window.
message APIBudgetHullStats {
  string hull = 1;
  int32 requests_in_window = 2;
  double req_per_sec = 3;
}

// APIBudgetReport mirrors internal/domain/apibudget.Report: global
// utilization vs the rate ceiling, 429 rate, purpose-share breakdown (poll
// vs transact vs retry), and the top consumers by hull.
message APIBudgetReport {
  double window_seconds = 1;
  int32 total_requests = 2;
  double global_req_per_sec = 3;
  double ceiling_req_per_sec = 4;
  double utilization_pct = 5;
  double headroom_req_per_sec = 6;
  int32 rate_limited_429 = 7;
  double rate_limited_429_per_min = 8;
  map<string, int32> purpose_counts = 9;
  map<string, double> purpose_share_pct = 10;
  double hulls_to_ceiling = 11;
  repeated APIBudgetHullStats per_hull = 12;
}

// DutyCycleHullStats is one hull's earning/idle breakdown within the
// duty-cycle sampling window (sp-51ti captain amendment).
message DutyCycleHullStats {
  string hull = 1;
  double earning_hours = 2;
  double idle_hours = 3;
  double earning_pct = 4;
  int32 sample_count = 5;
}

// DutyCycleReport mirrors internal/domain/dutycycle.Report: ship-hours
// EARNING/day per hull, the KPI that makes the 20x duty-cycle gap
// measurable.
message DutyCycleReport {
  double window_hours = 1;
  repeated DutyCycleHullStats hulls = 2;
}

message GetAPIBudgetResponse {
  // Current is a narrow (~10s) window, close to instantaneous utilization.
  APIBudgetReport current = 1;
  // Rolling5m is a 5-minute rolling window, smoothing out bursts.
  APIBudgetReport rolling_5m = 2;
  DutyCycleReport duty_cycle = 3;
}

// ListShipsRequest lists all ships for a player
message ListShipsRequest {
  // Optional player ID filter
  optional int32 player_id = 1;

  // Optional agent symbol (alternative to player_id)
  optional string agent_symbol = 2;
}

message ListShipsResponse {
  repeated ShipInfo ships = 1;
}

message ShipInfo {
  string symbol = 1;
  string location = 2;
  string nav_status = 3;
  int32 fuel_current = 4;
  int32 fuel_capacity = 5;
  int32 cargo_units = 6;
  int32 cargo_capacity = 7;
  int32 engine_speed = 8;
}

// GetShipRequest retrieves ship details
message GetShipRequest {
  string ship_symbol = 1;
  optional int32 player_id = 2;
  optional string agent_symbol = 3;
}

message GetShipResponse {
  ShipDetail ship = 1;
}

// RefreshShipRequest forces a resync of a ship from the API
message RefreshShipRequest {
  string ship_symbol = 1;
  optional int32 player_id = 2;
  optional string agent_symbol = 3;
}

message RefreshShipResponse {
  ShipDetail ship = 1;
}

// ReserveShipRequest reserves a ship for the captain's direct manual use
message ReserveShipRequest {
  string ship_symbol = 1;
  optional string reason = 2;
  optional int32 player_id = 3;
  optional string agent_symbol = 4;
  // force (sp-w3yd): when true, PREEMPT a coordinator's live claim — atomically
  // revoke it and transfer the hull to the captain (operator authority wins)
  // instead of rejecting. Absent/false is the byte-identical pre-sp-w3yd behavior.
  optional bool force = 5;
}

message ReserveShipResponse {
  string ship_symbol = 1;
  string reason = 2;
  // warning is non-empty if reserving this ship left zero other idle ships
  // sharing its role. Advisory only — the reservation already succeeded.
  string warning = 3;
  // preempted (sp-w3yd) is true when --force revoked a coordinator's live claim;
  // preempted_from names the container the claim was revoked from. Both zero for a
  // non-force reserve or a force reserve of an already-idle hull.
  bool preempted = 4;
  string preempted_from = 5;
}

// ReleaseShipRequest clears a captain reservation on a ship
message ReleaseShipRequest {
  string ship_symbol = 1;
  optional string reason = 2;
  optional int32 player_id = 3;
  optional string agent_symbol = 4;
}

message ReleaseShipResponse {
  string ship_symbol = 1;
}

// AssignShipFleetRequest dedicates a ship to a named fleet (sp-l7h2)
message AssignShipFleetRequest {
  string ship_symbol = 1;
  string fleet = 2;
  optional int32 player_id = 3;
  optional string agent_symbol = 4;
}

message AssignShipFleetResponse {
  string ship_symbol = 1;
  string fleet = 2;
}

// FleetHubRequest adds or removes a standby-station waypoint on a running
// operation's coordinator, live (sp-jcke).
message FleetHubRequest {
  // operation is the fleet/operation whose coordinator owns the standby set,
  // e.g. "contract" — the same tag its dedicated ships carry.
  string operation = 1;
  // waypoint is the standby-station waypoint symbol to add or remove.
  string waypoint = 2;
  // add=true adds the hub; add=false removes it.
  bool add = 3;
  optional int32 player_id = 4;
  optional string agent_symbol = 5;
}

message FleetHubResponse {
  string operation = 1;
  // standby_stations is the resulting live standby set after the mutation.
  repeated string standby_stations = 2;
  // changed is false when the verb was a no-op (add of an existing hub, or
  // remove of an absent one), so the CLI can report it honestly.
  bool changed = 3;
}

// UnassignShipFleetRequest clears a ship's fleet dedication (sp-l7h2)
message UnassignShipFleetRequest {
  string ship_symbol = 1;
  optional int32 player_id = 2;
  optional string agent_symbol = 3;
}

message UnassignShipFleetResponse {
  string ship_symbol = 1;
}

// ListFleetsRequest lists every dedicated fleet and its members (sp-l7h2)
message ListFleetsRequest {
  optional int32 player_id = 1;
  optional string agent_symbol = 2;
}

message FleetShip {
  string ship_symbol = 1;
  bool idle = 2; // no active assignment and not in transit — claimable now
}

message Fleet {
  string name = 1;
  repeated FleetShip ships = 2;
}

message ListFleetsResponse {
  repeated Fleet fleets = 1;
}

// ListWaypointsRequest lists the waypoints of a system from the waypoint cache
message ListWaypointsRequest {
  string system_symbol = 1;
  optional string trait = 2;         // Optional filter: only waypoints with this trait
  optional string type = 3;          // Optional filter: only waypoints of this type
  optional int32 player_id = 4;
  optional string agent_symbol = 5;
}

message ListWaypointsResponse {
  repeated WaypointDetail waypoints = 1;
}

// GetWaypointRequest retrieves a single waypoint's detail
message GetWaypointRequest {
  string waypoint_symbol = 1;
  optional int32 player_id = 2;
  optional string agent_symbol = 3;
}

message GetWaypointResponse {
  WaypointDetail waypoint = 1;
}

message WaypointDetail {
  string symbol = 1;
  string system_symbol = 2;
  string type = 3;
  double x = 4;
  double y = 5;
  repeated string traits = 6;
  repeated string orbitals = 7;
  bool has_fuel = 8;
}

message ShipDetail {
  string symbol = 1;
  string location = 2;
  string nav_status = 3;
  int32 fuel_current = 4;
  int32 fuel_capacity = 5;
  int32 cargo_units = 6;
  int32 cargo_capacity = 7;
  repeated CargoItem cargo_inventory = 8;
  int32 engine_speed = 9;
  string role = 10;
  // Fields 11-21 are the ship's reactor/power/slot/crew budget (sp-el60).
  // Reactors, frames, and crew capacity have no swap endpoint in the
  // SpaceTraders API, so these are permanent for the life of the hull.
  string reactor_symbol = 11;
  string reactor_name = 12;
  int32 reactor_power_output = 13;
  int32 power_used = 14;
  int32 module_slots = 15;
  int32 module_slots_used = 16;
  int32 mounting_points = 17;
  int32 mounting_points_used = 18;
  int32 crew_current = 19;
  int32 crew_required = 20;
  int32 crew_capacity = 21;
}

// PurchaseShipRequest requests purchase of a single ship
message PurchaseShipRequest {
  string purchasing_ship_symbol = 1;
  string ship_type = 2;
  int32 player_id = 3;
  optional string agent_symbol = 4;
  optional string shipyard_waypoint = 5; // Optional - will auto-discover if not provided
}

message PurchaseShipResponse {
  string container_id = 1;
  string purchased_ship_symbol = 2;
  int32 purchase_price = 3;
  int32 agent_credits = 4;
  string status = 5;
}

// BatchPurchaseShipsRequest requests batch purchase of multiple ships
message BatchPurchaseShipsRequest {
  string purchasing_ship_symbol = 1;
  string ship_type = 2;
  int32 quantity = 3;
  int32 max_budget = 4;
  int32 player_id = 5;
  optional string agent_symbol = 6;
  optional string shipyard_waypoint = 7; // Optional - will auto-discover if not provided
  optional int32 iterations = 8; // -1 for infinite, default 1
}

message BatchPurchaseShipsResponse {
  string container_id = 1;
  int32 ships_to_purchase = 2;
  int32 max_budget = 3;
  string shipyard_waypoint = 4;
  string status = 5;
}

// GetShipyardListingsRequest requests shipyard listings
message GetShipyardListingsRequest {
  string system_symbol = 1;
  string waypoint_symbol = 2;
  int32 player_id = 3;
  optional string agent_symbol = 4;
}

message GetShipyardListingsResponse {
  repeated ShipListing listings = 1;
  string shipyard_symbol = 2;
  int32 modification_fee = 3;
}

message ShipListing {
  string ship_type = 1;
  string name = 2;
  string description = 3;
  int32 purchase_price = 4;
}

message CargoItem {
  string symbol = 1;
  string name = 2;
  int32 units = 3;
}

// RouteSegment represents a single leg of a planned route
message RouteSegment {
  string from = 1;
  string to = 2;
  string flight_mode = 3;  // CRUISE, DRIFT, BURN, STEALTH
  int32 fuel_cost = 4;
  int32 travel_time = 5;   // seconds
}

// ShipRoute contains a ship's planned route
message ShipRoute {
  string ship_symbol = 1;
  string ship_type = 2;    // "miner" or "transport"
  repeated RouteSegment segments = 3;
  int32 total_fuel = 4;
  int32 total_time = 5;    // seconds
}

// StartGoodsFactoryRequest initiates automated goods production
message StartGoodsFactoryRequest {
  int32 player_id = 1;
  string target_good = 2;
  optional string system_symbol = 3; // Optional: defaults to current system
  optional string agent_symbol = 4;
  optional int32 max_iterations = 5; // Optional: -1 for infinite, 0 or unset for single run, >0 for specific count
  bool inputs_only = 6; // If true: feed the dependency tree but do NOT harvest the fabricated output — leave it in factory stock for a construction pipeline to source
}

// StartGoodsFactoryResponse returns factory details
message StartGoodsFactoryResponse {
  string factory_id = 1;
  string target_good = 2;
  string status = 3;
  string message = 4; // e.g., "Dependency tree built, 5 nodes to process"
  int32 nodes_total = 5;
}

// StopGoodsFactoryRequest stops a factory operation
message StopGoodsFactoryRequest {
  int32 player_id = 1;
  string factory_id = 2;
}

// StopGoodsFactoryResponse confirms factory stopped
message StopGoodsFactoryResponse {
  string factory_id = 1;
  string status = 2;
  string message = 3;
}

// FactoryWorkerCapRequest sets the live per-op concurrent-hull cap on a running
// goods factory (sp-ev0n).
message FactoryWorkerCapRequest {
  // container_id is the goods_factory container whose cap to set (its factory id).
  string container_id = 1;
  // count is the maximum number of hulls the chain runs concurrently (>= 1).
  int32 count = 2;
  optional int32 player_id = 3;
  optional string agent_symbol = 4;
}

// FactoryWorkerCapResponse returns the resulting live cap after the mutation.
message FactoryWorkerCapResponse {
  string container_id = 1;
  // worker_cap is the resulting concurrent-hull cap now in force.
  int32 worker_cap = 2;
  // changed is false when the verb was a no-op (the cap already equalled count),
  // so the CLI can report it honestly.
  bool changed = 3;
}

// TuneContainerConfigRequest sets one live knob on a running container (sp-vwek).
message TuneContainerConfigRequest {
  // container_id names the tune target directly. Exactly one of container_id
  // and operation is required.
  string container_id = 1;
  // operation resolves the target by coordinator type (e.g. "freshsizer",
  // "frontier") via the active-coordinator lookup, like `fleet hub` does.
  string operation = 2;
  // key is the knob to tune, e.g. "purchase_cooldown_secs".
  string key = 3;
  // value > 0 sets the knob (validated against the bounds registry);
  // value == 0 REVERTS the knob to its documented default.
  int64 value = 4;
  optional int32 player_id = 5;
  optional string agent_symbol = 6;
}

// TuneContainerConfigResponse reports old -> new effective values with units.
message TuneContainerConfigResponse {
  string container_id = 1;
  string container_type = 2;
  string key = 3;
  int64 old_effective = 4;
  string old_source = 5; // "live-config" | "default"
  int64 new_effective = 6;
  string new_source = 7;
  string unit = 8;
  int64 default_value = 9;
  // changed is false when the verb was an idempotent no-op (no write, no audit).
  bool changed = 10;
}

// ShowTunableConfigRequest lists a container's tunable knobs (sp-vwek --show).
message ShowTunableConfigRequest {
  string container_id = 1; // exactly one of container_id and operation
  string operation = 2;
  optional int32 player_id = 3;
  optional string agent_symbol = 4;
}

// TunableKnobStatus is one knob row of the --show listing.
message TunableKnobStatus {
  string key = 1;
  int64 effective = 2;
  string source = 3; // "live-config" | "default"
  int64 min = 4;
  int64 max = 5;
  string unit = 6;
  string description = 7;
  int64 default_value = 8;
}

// ShowTunableConfigResponse is the full --show listing for one container.
message ShowTunableConfigResponse {
  string container_id = 1;
  string container_type = 2;
  repeated TunableKnobStatus knobs = 3;
}

// GetFrontierStatusRequest resolves the running frontier coordinator for a player.
message GetFrontierStatusRequest {
  optional int32 player_id = 1;
  optional string agent_symbol = 2;
}

// GetFrontierStatusResponse is the frontier coordinator's one-view live state (sp-pvw3).
message GetFrontierStatusResponse {
  string container_id = 1;
  int32 discovery_share = 2;       // effective 0-100 percent charting virgin
  int32 scan_share = 3;            // 100 - discovery_share
  string split_summary = 4;        // e.g. "60% discover / 40% scan" or "100% discover — backlog empty"
  int32 virgin_queue_depth = 5;    // reachable uncovered virgin frontier systems
  int32 dark_systems = 6;          // charted markets with no/stale price data (honest backlog)
  int32 dark_marketplaces = 7;     // total unscanned marketplace count across those systems
  int32 probe_fleet = 8;           // total satellites owned
  int32 probe_cap = 9;             // max satellite cap
  int32 probes_idle = 10;          // idle relayable probes
  int32 posts_in_flight = 11;      // outstanding sweep-once posts
  int32 last_buy_price = 12;       // price of the most recent probe buy (0 if none)
  int32 last_buy_age_seconds = 13; // seconds since the most recent probe buy (-1 if none)
  repeated string blockers = 14;   // read-only reasons the buy path is failing closed
}

// GetFactoryStatusRequest retrieves factory status
message GetFactoryStatusRequest {
  int32 player_id = 1;
  string factory_id = 2;
}

// GetFactoryStatusResponse returns detailed factory status
message GetFactoryStatusResponse {
  string factory_id = 1;
  string target_good = 2;
  string status = 3;
  string dependency_tree = 4; // JSON-encoded dependency tree
  int32 quantity_acquired = 5; // 0 if not yet complete
  int32 total_cost = 6;
  int32 nodes_completed = 7;
  int32 nodes_total = 8;
  string system_symbol = 9;
  int32 ships_used = 10; // Number of ships utilized
  int32 market_queries = 11; // Number of market queries performed
  int32 parallel_levels = 12; // Number of parallel execution levels
  float estimated_speedup = 13; // Estimated speedup from parallelization
}

// ScanArbitrageOpportunitiesRequest scans for arbitrage opportunities
message ScanArbitrageOpportunitiesRequest {
  int32 player_id = 1;
  string system_symbol = 2; // System to scan (e.g., "X1-AU21")
  double min_margin = 3; // Minimum profit margin percentage (default 10.0)
  int32 limit = 4; // Maximum opportunities to return (default 20)
}

// ArbitrageOpportunity represents a single arbitrage opportunity
message ArbitrageOpportunity {
  string good = 1;
  string buy_market = 2;
  string sell_market = 3;
  int32 buy_price = 4;
  int32 sell_price = 5;
  int32 profit_per_unit = 6;
  double profit_margin = 7;
  int32 estimated_profit = 8;
  double distance = 9;
  string buy_supply = 10;
  string sell_activity = 11;
  double score = 12;
}

// ScanArbitrageOpportunitiesResponse returns scan results
message ScanArbitrageOpportunitiesResponse {
  repeated ArbitrageOpportunity opportunities = 1;
  int32 total_scanned = 2;
  string system_symbol = 3;
}

// StartArbitrageCoordinatorRequest starts arbitrage coordinator
message StartArbitrageCoordinatorRequest {
  int32 player_id = 1;
  string system_symbol = 2; // System to trade in (e.g., "X1-AU21")
  double min_margin = 3; // Minimum profit margin percentage (default 10.0)
  int32 max_workers = 4; // Maximum parallel workers (default 10)
  int32 min_balance = 5; // Minimum credit balance to maintain (default 0 = no limit)
}

// StartArbitrageCoordinatorResponse returns coordinator details
message StartArbitrageCoordinatorResponse {
  string container_id = 1;
  string system_symbol = 2;
  double min_margin = 3;
  int32 max_workers = 4;
  int32 min_balance = 5;
  string status = 6;
  string message = 7;
}

// JettisonCargoRequest jettisons cargo from a ship
message JettisonCargoRequest {
  string ship_symbol = 1;
  int32 player_id = 2;
  optional string agent_symbol = 3;
  string good_symbol = 4;
  int32 units = 5;
}

// JettisonCargoResponse returns result of jettison operation
message JettisonCargoResponse {
  string container_id = 1;
  string ship_symbol = 2;
  string good_symbol = 3;
  int32 units_jettisoned = 4;
  string status = 5;
  string message = 6;
}

// StartTradeRouteRequest launches a single-hull pure-arbitrage circuit on an idle hull
message StartTradeRouteRequest {
  int32 player_id = 1;
  string ship_symbol = 2;             // Idle hull to fly the circuit
  string system_symbol = 3;           // System to scan for arbitrage lanes
  optional string agent_symbol = 4;
  optional int32 max_visits = 5;      // Safety bound on circuit visits (0 = default 50)
  // Optional lane-targeting override (sp-xwa1): a destination waypoint or
  // system symbol to pin the circuit to, instead of letting the ranker
  // auto-select a lane. Also waives the cross-system gate-crossing ranking
  // penalty for the targeted lane alone. Unset preserves the original
  // undirected auto-scan behavior unchanged.
  optional string dest_waypoint = 6;
}

// StartTradeRouteResponse returns the started trade-route container
message StartTradeRouteResponse {
  string container_id = 1;
  string ship_symbol = 2;
  string system_symbol = 3;
  string status = 4;
  string message = 5;
}

// StartWarehouseRequest starts a passive inventory warehouse (sp-dchv Lane B) on an
// idle, dedicated storage hull parked at a home waypoint. The hull buffers the
// whitelisted goods deposited by tour/trade legs; contract workers withdraw from it.
message StartWarehouseRequest {
  int32 player_id = 1;
  string ship_symbol = 2;              // Idle dedicated storage hull
  string waypoint_symbol = 3;          // Home waypoint to park the hull at
  repeated string supported_goods = 4; // Goods whitelist this warehouse buffers
}

// StartWarehouseResponse returns the started warehouse container
message StartWarehouseResponse {
  string container_id = 1;
  string ship_symbol = 2;
  string waypoint_symbol = 3;
  string status = 4;
  string message = 5;
}

// StartArbRunRequest starts a one-shot, captain-directed, guarded arbitrage run (sp-p4ua):
// fly THIS hull on THIS lane, ONCE, safely. All caps/floors are optional guards.
message StartArbRunRequest {
  int32 player_id = 1;
  string ship_symbol = 2;              // Idle hull that must already be at buy_at
  string good = 3;                     // The good to buy at the source and sell at the destination
  string buy_at = 4;                   // Source waypoint (the hull must already be here)
  string sell_at = 5;                  // Destination waypoint (may be in another system → gate+jump+refuel)
  optional string agent_symbol = 6;
  optional int32 max_units = 7;                // Hold-cap on the tranche (0/unset = full available cargo)
  optional int32 max_spend = 8;                // Working-capital cap on the buy (0/unset = no explicit cap)
  optional int32 min_margin = 9;               // Per-unit margin floor: abort if (destBid - sourceAsk) < this
  optional int32 working_capital_reserve = 10; // Hard spend floor (0/unset = coordinator default)
}

message StartArbRunResponse {
  string container_id = 1;
  string ship_symbol = 2;
  string good = 3;
  string buy_at = 4;
  string sell_at = 5;
  string status = 6;
  string message = 7;
}

// StartTourRunRequest starts a one-shot, captain-directed, guarded multi-hop trade
// tour (sp-1ek0): fly ONE idle hull through a planner-chosen tour, guarded. All caps
// and floors are optional (0/unset = coordinator default).
message StartTourRunRequest {
  int32 player_id = 1;
  string ship_symbol = 2;                      // Idle hull to fly the tour
  optional string agent_symbol = 3;
  optional int32 max_hops = 4;                 // 0/unset = planner default (6)
  optional int64 max_spend = 5;                // 0/unset = 25% of live treasury (re-resolved per tour when iterations != 0/1)
  optional int32 min_margin = 6;               // Per-unit margin floor passed to the planner
  optional int32 replan_limit = 7;             // 0/unset = coordinator default (2), PER TOUR
  optional int64 working_capital_reserve = 8;  // Hard spend floor (0/unset = coordinator default)
  optional int32 iterations = 9;               // sp-m5kv: -1 = CONTINUOUS (tour until margins die), N>0 = N tours, 0/unset = one tour
}

message StartTourRunResponse {
  string container_id = 1;
  string ship_symbol = 2;
  string status = 3;
  string message = 4;
}

// StartStockerRequest starts the STOCKER LOOP (sp-zdwg): a dedicated hull fills a home
// warehouse with contract-recurrent goods bought cheap at foreign markets. All caps and
// floors are optional (0/unset = coordinator default).
message StartStockerRequest {
  int32 player_id = 1;
  string ship_symbol = 2;                      // Dedicated hull to fly the stocker loop
  string warehouse_waypoint = 3;               // Home warehouse waypoint to deposit into (its system is the demand anchor)
  optional string agent_symbol = 4;
  optional int32 budget_per_leg = 5;           // Per-buy-leg spend cap in credits (0/unset = no explicit per-leg cap)
  optional int64 working_capital_reserve = 6;  // Hard spend floor (0/unset = coordinator default, 50k)
  optional int32 iterations = 7;               // -1 = CONTINUOUS (fill until nothing left to stock), N>0 = N round-trips, 0/unset = one round-trip
  optional int32 max_market_age_minutes = 8;   // Freshness cap on the foreign ask (0/unset = 75)
  optional int32 target_per_good = 9;          // Fill-target override per good (0/unset = the miner's measured demand units)
  optional bool standing = 10;                 // STANDING refill (sp-k1ka): never completes at target — parks and auto-re-stages when contracts drain the warehouse below target; survives restart (re-adopted standing from persisted config). No manual relaunch.
  optional int32 tick_seconds = 11;            // STANDING park cadence between at-target re-checks (0/unset = 30s)
  optional int32 refill_hysteresis = 12;       // STANDING target-hysteresis: minimum units-short before re-staging a good (0/unset = 1), so a tiny gap does not thrash a refill
}

message StartStockerResponse {
  string container_id = 1;
  string ship_symbol = 2;
  string warehouse_waypoint = 3;
  string status = 4;
  string message = 5;
}

// GasExtractionOperationRequest starts a gas extraction operation with siphon and transport ships
message GasExtractionOperationRequest {
  optional string gas_giant = 1;       // Optional: specific waypoint, or auto-select
  repeated string siphon_ships = 2;    // Ships for gas siphoning (need SIPHON mount + GAS_PROCESSOR)
  repeated string transport_ships = 3; // Ships for transport to factories
  int32 player_id = 4;
  optional string agent_symbol = 5;
  bool force = 6;                      // Override fuel validation warnings
  bool dry_run = 7;                    // If true, only select gas giant without starting operation
  int32 max_leg_time = 8;              // Max time per leg in minutes (0 = no limit)
}

// GasExtractionOperationResponse returns the result of starting a gas extraction operation
message GasExtractionOperationResponse {
  string container_id = 1;
  string gas_giant = 2;
  repeated string siphon_ships = 3;
  repeated string transport_ships = 4;
  string status = 5;
  // Dry-run results
  repeated ShipRoute ship_routes = 6;    // Planned routes for all ships
  repeated string errors = 7;            // Any errors during route planning
}

// StartConstructionPipelineRequest starts a pipeline to supply materials to a construction site
message StartConstructionPipelineRequest {
  // Waypoint symbol of the construction site (e.g., "X1-FB5-I61")
  string construction_site = 1;
  // Player ID for the operation
  int32 player_id = 2;
  // Optional agent symbol (alternative to player_id)
  optional string agent_symbol = 3;
  // Supply chain depth: 0=full chain, 1=raw only, 2=intermediates, 3=buy final
  int32 supply_chain_depth = 4;
  // Maximum parallel workers (default 5)
  int32 max_workers = 5;
  // Optional system symbol (defaults to deriving from construction_site)
  optional string system_symbol = 6;
  // Optional caller-set EXPORT sourcing floor (sp-ezz9), e.g. "SCARCE".
  // Lowers the supply-priority locator's acceptance floor below the default
  // MODERATE using its existing tolerance ladder. Unset preserves the
  // original MODERATE-floor behavior unchanged.
  optional string min_supply = 7;

  // Optional per-good buy-gating overrides (sp-sdyo values, sp-pdb3 launch surface) as a
  // JSON-encoded GoodGatingOverrides map: good -> {strategy?, priceCeilingMult?, minSupply?}.
  // Loosens gating for named bottleneck goods only; every other good keeps the global floor above.
  // Persisted on the pipeline so it survives a restart (RULINGS #2). Unset preserves today's
  // global-default behaviour for every good. priceCeilingMult is clamped to the domain hard cap.
  optional string good_overrides = 8;
}

// StartConstructionPipelineResponse returns the result of starting a construction pipeline
message StartConstructionPipelineResponse {
  string pipeline_id = 1;
  string construction_site = 2;
  bool is_resumed = 3;  // true if resuming existing pipeline
  repeated ConstructionMaterial materials = 4;
  int32 task_count = 5;
  string status = 6;
  string message = 7;
  // Trade symbols of materials that could not be sourced this call (sp-560b).
  // Each still has a visible PENDING task that the SupplyMonitor re-sources
  // when supply regenerates; this names them so the operator can source the
  // gap manually instead of only seeing a generic "no market" log line.
  repeated string deferred_materials = 8;
}

// ConstructionMaterial represents a material required for construction
message ConstructionMaterial {
  string trade_symbol = 1;
  int32 required = 2;
  int32 fulfilled = 3;
  int32 remaining = 4;
  double progress = 5;
}

// GetConstructionStatusRequest retrieves the status of a construction site
message GetConstructionStatusRequest {
  string construction_site = 1;
  int32 player_id = 2;
  optional string agent_symbol = 3;
}

// GetConstructionStatusResponse returns the status of a construction site
message GetConstructionStatusResponse {
  string construction_site = 1;
  bool is_complete = 2;
  double progress = 3;
  repeated ConstructionMaterial materials = 4;
  // Pipeline info (if any)
  optional string pipeline_id = 5;
  optional string pipeline_status = 6;
  optional double pipeline_progress = 7;
}

// StopConstructionPipelineRequest cancels the active construction pipeline for a site
message StopConstructionPipelineRequest {
  string construction_site = 1;
  int32 player_id = 2;
  optional string agent_symbol = 3;
}

// StopConstructionPipelineResponse returns the result of stopping a construction pipeline
message StopConstructionPipelineResponse {
  string pipeline_id = 1;
  string construction_site = 2;
  string status = 3;         // pipeline status after cancellation (CANCELLED)
  int32 tasks_cancelled = 4;
  string message = 5;
}

// ConstructionGoodOverrideRequest sets or clears ONE good's per-good buy-gating override on a
// running construction pipeline (sp-pdb3). construction_site + good identify the target. clear
// removes the good's override, reverting it to the global default. The three optional knobs mirror
// manufacturing.GoodGatingOverride; an unset knob leaves that dimension unchanged (tune one at a
// time). price_ceiling_mult is clamped to the domain hard cap — the CLI never bypasses the
// guardrail (RULINGS #4).
message ConstructionGoodOverrideRequest {
  string construction_site = 1;
  string good = 2;
  int32 player_id = 3;
  optional string agent_symbol = 4;
  // clear removes any existing override for good, reverting it to the global default.
  bool clear = 5;
  optional string min_supply = 6;
  optional string strategy = 7;
  optional double price_ceiling_mult = 8;
}

// ConstructionGoodOverrideResponse confirms the resulting override state for the good.
message ConstructionGoodOverrideResponse {
  string construction_site = 1;
  string good = 2;
  // cleared is true when the request removed the override.
  bool cleared = 3;
  // changed is false when the request was a no-op (the value already matched).
  bool changed = 4;
  // The resulting override values for the good (empty/zero when cleared or that knob is unset).
  string strategy = 5;
  double price_ceiling_mult = 6;
  string min_supply = 7;
}

// --- Contract depot management messages (sp-u9xa) ---

// DepotElement is one placed depot member: a {waypoint, ship} pair. ship_symbol may
// be empty for a declared-but-uncrewed slot. Nothing here is hardcoded — the whole
// topology is operator data.
message DepotElement {
  string waypoint = 1;
  string ship_symbol = 2;
}

// DepotSpec is one whole depot: its id and its four element classes (destination
// warehouses — the routing anchor, at least one — background stockers, pinned delivery
// hulls, and source hubs).
message DepotSpec {
  string id = 1;
  repeated DepotElement warehouses = 2;
  repeated DepotElement stockers = 3;
  repeated DepotElement delivery_hulls = 4;
  repeated DepotElement source_hubs = 5;
}

// ApplyDepotTopologyRequest is the DECLARATIVE bulk apply: it makes the player's
// persisted set EXACTLY these depots (upsert each, delete any not named).
message ApplyDepotTopologyRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  repeated DepotSpec depots = 3;
}

message ApplyDepotTopologyResponse {
  string status = 1;
  int32 depot_count = 2;
}

// AddDepotRequest adds ONE depot without disturbing the rest (granular create).
message AddDepotRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  DepotSpec depot = 3;
}

message AddDepotResponse {
  string status = 1;
}

// RemoveDepotRequest deletes ONE depot by id (granular, idempotent).
message RemoveDepotRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  string depot_id = 3;
}

message RemoveDepotResponse {
  string status = 1;
}

// AddDepotElementRequest adds one element to a depot's named role (warehouse |
// stocker | delivery-hull | source-hub).
message AddDepotElementRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  string depot_id = 3;
  string role = 4;
  string waypoint = 5;
  string ship_symbol = 6;
}

// RemoveDepotElementRequest drops the element crewed by ship_symbol from a role.
message RemoveDepotElementRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  string depot_id = 3;
  string role = 4;
  string ship_symbol = 5;
}

// PlaceDepotElementRequest repositions the element crewed by ship_symbol in a role to
// waypoint (the parametrized co-location op).
message PlaceDepotElementRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  string depot_id = 3;
  string role = 4;
  string ship_symbol = 5;
  string waypoint = 6;
}

// DepotElementResponse is the shared reply for the granular element ops.
message DepotElementResponse {
  string status = 1;
}

message ListDepotsRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
}

message ListDepotsResponse {
  repeated DepotSpec depots = 1;
}

// StartDepotRequest persists ONE depot's topology and launches its coordinators (sp-38xc).
message StartDepotRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  DepotSpec depot = 3;
}

message StartDepotResponse {
  string status = 1;
  int32 launched = 2; // coordinators (warehouses + stockers) launched
}

// StopDepotRequest tears down the named depot's running coordinators (sp-38xc).
message StopDepotRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  string depot_id = 3;
}

message StopDepotResponse {
  string status = 1;
  int32 stopped = 2; // containers stopped
}
