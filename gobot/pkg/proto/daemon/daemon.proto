syntax = "proto3";

package daemon;

option go_package = "github.com/andrescamacho/spacetraders-go/pkg/proto/daemon";

// DaemonService defines the gRPC API for CLI <-> Daemon communication
// Communication occurs over Unix domain socket for security and performance
service DaemonService {
  // NavigateShip initiates a ship navigation operation as a background container
  rpc NavigateShip(NavigateShipRequest) returns (NavigateShipResponse);

  // DockShip docks a ship at its current location
  rpc DockShip(DockShipRequest) returns (DockShipResponse);

  // OrbitShip puts a ship into orbit from docked position
  rpc OrbitShip(OrbitShipRequest) returns (OrbitShipResponse);

  // RefuelShip refuels a ship at its current location
  rpc RefuelShip(RefuelShipRequest) returns (RefuelShipResponse);

  // JumpShip executes a jump to a different star system via jump gate
  rpc JumpShip(JumpShipRequest) returns (JumpShipResponse);

  // BatchContractWorkflow executes batch contract workflow operations
  rpc BatchContractWorkflow(BatchContractWorkflowRequest) returns (BatchContractWorkflowResponse);

  // ContractFleetCoordinator manages a pool of ships for continuous contract execution
  rpc ContractFleetCoordinator(ContractFleetCoordinatorRequest) returns (ContractFleetCoordinatorResponse);

  // ScoutTour executes market scouting tour operations (single ship)
  rpc ScoutTour(ScoutTourRequest) returns (ScoutTourResponse);

  // ScoutMarkets orchestrates fleet deployment for market scouting (multi-ship with VRP)
  rpc ScoutMarkets(ScoutMarketsRequest) returns (ScoutMarketsResponse);

  // AssignScoutingFleet auto-discovers probe/satellite ships and assigns them to scout markets
  rpc AssignScoutingFleet(AssignScoutingFleetRequest) returns (AssignScoutingFleetResponse);

  // ScoutPostCoordinator starts the standing scout-post coordinator (sp-cxpq)
  rpc ScoutPostCoordinator(ScoutPostCoordinatorRequest) returns (ScoutPostCoordinatorResponse);

  // AddScoutPost adds or updates a desired-state scout post for a system
  rpc AddScoutPost(AddScoutPostRequest) returns (ScoutPostResponse);

  // RemoveScoutPost removes a scout post for a system
  rpc RemoveScoutPost(RemoveScoutPostRequest) returns (RemoveScoutPostResponse);

  // ListScoutPosts returns the active scout posts for a player
  rpc ListScoutPosts(ListScoutPostsRequest) returns (ListScoutPostsResponse);

  // ListContainers returns all running background containers
  rpc ListContainers(ListContainersRequest) returns (ListContainersResponse);

  // GetContainer returns detailed information about a specific container
  rpc GetContainer(GetContainerRequest) returns (GetContainerResponse);

  // StopContainer stops a running background container
  rpc StopContainer(StopContainerRequest) returns (StopContainerResponse);

  // GetContainerLogs retrieves logs from a container
  rpc GetContainerLogs(GetContainerLogsRequest) returns (GetContainerLogsResponse);

  // HealthCheck verifies daemon is running and responsive
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);

  // GetAPIBudget returns API request-budget observability (sp-51ti):
  // per-hull req/s, global utilization vs the rate ceiling (429 rate, poll
  // cadence share of the budget, headroom), and the duty-cycle KPI
  // (ship-hours earning/day per hull).
  rpc GetAPIBudget(GetAPIBudgetRequest) returns (GetAPIBudgetResponse);

  // ListShips returns all ships for a player
  rpc ListShips(ListShipsRequest) returns (ListShipsResponse);

  // GetShip returns detailed information about a specific ship
  rpc GetShip(GetShipRequest) returns (GetShipResponse);

  // RefreshShip forces a resync of a ship from the API, overwriting the cache
  rpc RefreshShip(RefreshShipRequest) returns (RefreshShipResponse);

  // ReserveShip reserves a ship for the captain's direct manual use, hiding
  // it from every coordinator's assignment discovery (sp-i1ku)
  rpc ReserveShip(ReserveShipRequest) returns (ReserveShipResponse);

  // ReleaseShip clears a captain reservation, returning the ship to idle so
  // normal coordinator discovery can claim it again (sp-i1ku)
  rpc ReleaseShip(ReleaseShipRequest) returns (ReleaseShipResponse);

  // AssignShipFleet dedicates a ship to a named fleet, making it exclusive
  // to that fleet's coordinator (sp-l7h2)
  rpc AssignShipFleet(AssignShipFleetRequest) returns (AssignShipFleetResponse);

  // UnassignShipFleet clears a ship's fleet dedication, returning it to the
  // general pool (sp-l7h2)
  rpc UnassignShipFleet(UnassignShipFleetRequest) returns (UnassignShipFleetResponse);

  // ListFleets lists every dedicated fleet and its member ships (sp-l7h2)
  rpc ListFleets(ListFleetsRequest) returns (ListFleetsResponse);

  // ListWaypoints lists the waypoints of a system from the daemon's waypoint cache
  rpc ListWaypoints(ListWaypointsRequest) returns (ListWaypointsResponse);

  // GetWaypoint returns the detail of a single waypoint
  rpc GetWaypoint(GetWaypointRequest) returns (GetWaypointResponse);

  // PurchaseShip purchases a single ship from a shipyard
  rpc PurchaseShip(PurchaseShipRequest) returns (PurchaseShipResponse);

  // BatchPurchaseShips purchases multiple ships from a shipyard as a background operation
  rpc BatchPurchaseShips(BatchPurchaseShipsRequest) returns (BatchPurchaseShipsResponse);

  // GetShipyardListings retrieves available ships at a shipyard
  rpc GetShipyardListings(GetShipyardListingsRequest) returns (GetShipyardListingsResponse);

  // StartGoodsFactory initiates automated goods production using supply chain fabrication
  rpc StartGoodsFactory(StartGoodsFactoryRequest) returns (StartGoodsFactoryResponse);

  // StopGoodsFactory stops a running goods factory operation
  rpc StopGoodsFactory(StopGoodsFactoryRequest) returns (StopGoodsFactoryResponse);

  // GetFactoryStatus retrieves status and progress of a goods factory
  rpc GetFactoryStatus(GetFactoryStatusRequest) returns (GetFactoryStatusResponse);

  // ScanArbitrageOpportunities scans markets for profitable arbitrage opportunities
  rpc ScanArbitrageOpportunities(ScanArbitrageOpportunitiesRequest) returns (ScanArbitrageOpportunitiesResponse);

  // StartArbitrageCoordinator initiates automated arbitrage trading operations
  rpc StartArbitrageCoordinator(StartArbitrageCoordinatorRequest) returns (StartArbitrageCoordinatorResponse);

  // StartParallelManufacturingCoordinator initiates parallel task-based manufacturing operations
  rpc StartParallelManufacturingCoordinator(StartParallelManufacturingCoordinatorRequest) returns (StartParallelManufacturingCoordinatorResponse);

  // JettisonCargo jettisons cargo from a ship
  rpc JettisonCargo(JettisonCargoRequest) returns (JettisonCargoResponse);

  // GasExtractionOperation starts a gas extraction operation with siphon and transport ships
  rpc GasExtractionOperation(GasExtractionOperationRequest) returns (GasExtractionOperationResponse);

  // StartTradeRoute launches a single-hull pure-arbitrage circuit as a recovery-safe daemon container
  rpc StartTradeRoute(StartTradeRouteRequest) returns (StartTradeRouteResponse);

  // StartArbRun launches a ONE-SHOT, captain-directed, guarded arbitrage run (sp-p4ua):
  // buy a named good at a source waypoint, route (cross-gate) to a destination, sell once, stop.
  rpc StartArbRun(StartArbRunRequest) returns (StartArbRunResponse);

  // StartTourRun launches a ONE-SHOT, captain-directed, guarded multi-hop trade tour
  // (sp-1ek0): plan a depth-aware tour for one idle hull, fly it leg by leg with prices
  // re-verified live, re-plan on drift, and stop.
  rpc StartTourRun(StartTourRunRequest) returns (StartTourRunResponse);

  // StartConstructionPipeline starts a pipeline to supply materials to a construction site
  rpc StartConstructionPipeline(StartConstructionPipelineRequest) returns (StartConstructionPipelineResponse);

  // GetConstructionStatus retrieves the status of a construction site
  rpc GetConstructionStatus(GetConstructionStatusRequest) returns (GetConstructionStatusResponse);

  // StopConstructionPipeline cancels the active construction pipeline for a site (sp-yzrv)
  rpc StopConstructionPipeline(StopConstructionPipelineRequest) returns (StopConstructionPipelineResponse);
}

// NavigateShipRequest initiates ship navigation
message NavigateShipRequest {
  // Ship symbol to navigate (e.g., "AGENT-1")
  string ship_symbol = 1;

  // Destination waypoint symbol (e.g., "X1-GZ7-B1")
  string destination = 2;

  // Player ID for authentication
  int32 player_id = 3;

  // Optional agent symbol (alternative to player_id)
  optional string agent_symbol = 4;
}

// NavigateShipResponse returns container ID for tracking
message NavigateShipResponse {
  // Container ID for tracking the navigation operation
  string container_id = 1;

  // Ship symbol
  string ship_symbol = 2;

  // Destination waypoint
  string destination = 3;

  // Initial status
  string status = 4;

  // Estimated total travel time in seconds
  int32 estimated_time_seconds = 5;
}

// DockShipRequest initiates ship docking
message DockShipRequest {
  string ship_symbol = 1;
  int32 player_id = 2;
  optional string agent_symbol = 3;
}

message DockShipResponse {
  string container_id = 1;
  string ship_symbol = 2;
  string status = 3;
}

// OrbitShipRequest initiates ship orbit
message OrbitShipRequest {
  string ship_symbol = 1;
  int32 player_id = 2;
  optional string agent_symbol = 3;
}

message OrbitShipResponse {
  string container_id = 1;
  string ship_symbol = 2;
  string status = 3;
}

// RefuelShipRequest initiates ship refueling
message RefuelShipRequest {
  string ship_symbol = 1;
  int32 player_id = 2;
  optional string agent_symbol = 3;

  // Optional: specific fuel units to purchase. Omit for full tank.
  optional int32 units = 4;
}

message RefuelShipResponse {
  string container_id = 1;
  string ship_symbol = 2;
  int32 fuel_added = 3;
  int32 credits_cost = 4;
  string status = 5;
}

// JumpShipRequest initiates a jump to another system
message JumpShipRequest {
  string ship_symbol = 1;
  string destination_system = 2;
  int32 player_id = 3;
  optional string agent_symbol = 4;
}

message JumpShipResponse {
  bool success = 1;
  bool navigated_to_gate = 2;
  string jump_gate_symbol = 3;
  string destination_system = 4;
  int32 cooldown_seconds = 5;
  string message = 6;
  string error = 7;
}

// BatchContractWorkflowRequest initiates batch contract workflow
message BatchContractWorkflowRequest {
  string ship_symbol = 1;
  int32 iterations = 2;
  int32 player_id = 3;
  optional string agent_symbol = 4;
}

message BatchContractWorkflowResponse {
  string container_id = 1;
  string ship_symbol = 2;
  int32 iterations = 3;
  string status = 4;
}

// ContractFleetCoordinatorRequest initiates contract fleet coordination
// Uses all available idle light hauler ships (no pre-assignment needed)
message ContractFleetCoordinatorRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  // dedicated_ships (sp-snmb): operator-supplied --dedicated-ships list.
  // Ships on this list are claim-filtered from every other coordinator's
  // discovery pool and reserved exclusively for this contract coordinator.
  // Optional - empty/absent means no dedicated fleet is configured.
  repeated string dedicated_ships = 3;
  // standby_stations (sp-snmb): operator-supplied --standby-stations list.
  // An idle dedicated ship homes to the nearest of these waypoints instead
  // of being balanced to a market. Optional - empty/absent disables homing.
  repeated string standby_stations = 4;
}

message ContractFleetCoordinatorResponse {
  string container_id = 1;
  string status = 2;
}

// ScoutTourRequest initiates market scouting tour
message ScoutTourRequest {
  string ship_symbol = 1;
  repeated string markets = 2;
  int32 iterations = 3;
  int32 player_id = 4;
  optional string agent_symbol = 5;
}

message ScoutTourResponse {
  string container_id = 1;
  string ship_symbol = 2;
  repeated string markets = 3;
  int32 iterations = 4;
  string status = 5;
}

// ScoutPost is one desired-state post (sp-cxpq): keep system_symbol scanned to
// within freshness_seconds, via kind ("standing" or "sweep_once"), currently
// manned by assigned_hull (empty if unmanned) through tour_container_id.
message ScoutPost {
  string system_symbol = 1;
  int32 freshness_seconds = 2;
  string kind = 3;
  string assigned_hull = 4;
  string tour_container_id = 5;
}

// ScoutPostCoordinatorRequest starts the standing scout-post coordinator.
message ScoutPostCoordinatorRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  // tick_interval_secs is the reconcile cadence; 0 uses the coordinator default.
  int32 tick_interval_secs = 3;
}

message ScoutPostCoordinatorResponse {
  string container_id = 1;
  string status = 2;
}

// AddScoutPostRequest adds or updates a post. An existing post's live assignment
// is preserved; only freshness and kind change.
message AddScoutPostRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  string system_symbol = 3;
  int32 freshness_seconds = 4;
  string kind = 5;
}

message ScoutPostResponse {
  ScoutPost post = 1;
}

// RemoveScoutPostRequest removes a post and releases its hull if manned.
message RemoveScoutPostRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
  string system_symbol = 3;
}

message RemoveScoutPostResponse {
  string status = 1;
}

message ListScoutPostsRequest {
  int32 player_id = 1;
  optional string agent_symbol = 2;
}

message ListScoutPostsResponse {
  repeated ScoutPost posts = 1;
}

// ScoutMarketsRequest initiates fleet market scouting with VRP optimization
message ScoutMarketsRequest {
  repeated string ship_symbols = 1;
  string system_symbol = 2;
  repeated string markets = 3;
  int32 iterations = 4;
  int32 player_id = 5;
  optional string agent_symbol = 6;
}

message ScoutMarketsResponse {
  repeated string container_ids = 1;
  map<string, MarketAssignment> assignments = 2;
  repeated string reused_containers = 3;
}

// MarketAssignment represents markets assigned to a ship
message MarketAssignment {
  repeated string markets = 1;
}

// AssignScoutingFleetRequest auto-discovers and assigns scouting fleet
message AssignScoutingFleetRequest {
  string system_symbol = 1;
  int32 player_id = 2;
  optional string agent_symbol = 3;
}

message AssignScoutingFleetResponse {
  string container_id = 1; // Fleet-assignment container ID
}

// ListContainersRequest lists all containers
message ListContainersRequest {
  // Optional filter by player ID
  optional int32 player_id = 1;

  // Optional filter by container status
  optional string status = 2;
}

message ListContainersResponse {
  repeated ContainerInfo containers = 1;
}

message ContainerInfo {
  string container_id = 1;
  string container_type = 2;
  string status = 3;
  int32 player_id = 4;
  string created_at = 5;
  string updated_at = 6;

  // Iteration tracking for loops
  int32 current_iteration = 7;
  int32 max_iterations = 8;

  // Restart tracking
  int32 restart_count = 9;

  // Parent container ID (null for root containers)
  optional string parent_container_id = 10;
}

// GetContainerRequest retrieves container details
message GetContainerRequest {
  string container_id = 1;
}

message GetContainerResponse {
  ContainerInfo container = 1;
  string metadata = 2; // JSON-encoded metadata
}

// StopContainerRequest stops a container
message StopContainerRequest {
  string container_id = 1;
}

message StopContainerResponse {
  string container_id = 1;
  string status = 2;
  string message = 3;
}

// GetContainerLogsRequest retrieves container logs
message GetContainerLogsRequest {
  string container_id = 1;

  // Optional limit on number of log entries
  optional int32 limit = 2;

  // Optional filter by log level (INFO, WARNING, ERROR, DEBUG)
  optional string level = 3;
}

message GetContainerLogsResponse {
  repeated LogEntry logs = 1;
}

message LogEntry {
  string timestamp = 1;
  string level = 2;
  string message = 3;
  string metadata = 4; // JSON-encoded metadata
}

// HealthCheckRequest verifies daemon status
message HealthCheckRequest {
  // Empty for now
}

message HealthCheckResponse {
  string status = 1; // "ok" or error message
  string version = 2;
  int32 active_containers = 3;
}

// GetAPIBudgetRequest requests a snapshot of API request-budget
// observability (sp-51ti). Empty for now.
message GetAPIBudgetRequest {
}

// APIBudgetHullStats is one hull's share of the request budget within a
// report window.
message APIBudgetHullStats {
  string hull = 1;
  int32 requests_in_window = 2;
  double req_per_sec = 3;
}

// APIBudgetReport mirrors internal/domain/apibudget.Report: global
// utilization vs the rate ceiling, 429 rate, purpose-share breakdown (poll
// vs transact vs retry), and the top consumers by hull.
message APIBudgetReport {
  double window_seconds = 1;
  int32 total_requests = 2;
  double global_req_per_sec = 3;
  double ceiling_req_per_sec = 4;
  double utilization_pct = 5;
  double headroom_req_per_sec = 6;
  int32 rate_limited_429 = 7;
  double rate_limited_429_per_min = 8;
  map<string, int32> purpose_counts = 9;
  map<string, double> purpose_share_pct = 10;
  double hulls_to_ceiling = 11;
  repeated APIBudgetHullStats per_hull = 12;
}

// DutyCycleHullStats is one hull's earning/idle breakdown within the
// duty-cycle sampling window (sp-51ti captain amendment).
message DutyCycleHullStats {
  string hull = 1;
  double earning_hours = 2;
  double idle_hours = 3;
  double earning_pct = 4;
  int32 sample_count = 5;
}

// DutyCycleReport mirrors internal/domain/dutycycle.Report: ship-hours
// EARNING/day per hull, the KPI that makes the 20x duty-cycle gap
// measurable.
message DutyCycleReport {
  double window_hours = 1;
  repeated DutyCycleHullStats hulls = 2;
}

message GetAPIBudgetResponse {
  // Current is a narrow (~10s) window, close to instantaneous utilization.
  APIBudgetReport current = 1;
  // Rolling5m is a 5-minute rolling window, smoothing out bursts.
  APIBudgetReport rolling_5m = 2;
  DutyCycleReport duty_cycle = 3;
}

// ListShipsRequest lists all ships for a player
message ListShipsRequest {
  // Optional player ID filter
  optional int32 player_id = 1;

  // Optional agent symbol (alternative to player_id)
  optional string agent_symbol = 2;
}

message ListShipsResponse {
  repeated ShipInfo ships = 1;
}

message ShipInfo {
  string symbol = 1;
  string location = 2;
  string nav_status = 3;
  int32 fuel_current = 4;
  int32 fuel_capacity = 5;
  int32 cargo_units = 6;
  int32 cargo_capacity = 7;
  int32 engine_speed = 8;
}

// GetShipRequest retrieves ship details
message GetShipRequest {
  string ship_symbol = 1;
  optional int32 player_id = 2;
  optional string agent_symbol = 3;
}

message GetShipResponse {
  ShipDetail ship = 1;
}

// RefreshShipRequest forces a resync of a ship from the API
message RefreshShipRequest {
  string ship_symbol = 1;
  optional int32 player_id = 2;
  optional string agent_symbol = 3;
}

message RefreshShipResponse {
  ShipDetail ship = 1;
}

// ReserveShipRequest reserves a ship for the captain's direct manual use
message ReserveShipRequest {
  string ship_symbol = 1;
  optional string reason = 2;
  optional int32 player_id = 3;
  optional string agent_symbol = 4;
}

message ReserveShipResponse {
  string ship_symbol = 1;
  string reason = 2;
  // warning is non-empty if reserving this ship left zero other idle ships
  // sharing its role. Advisory only — the reservation already succeeded.
  string warning = 3;
}

// ReleaseShipRequest clears a captain reservation on a ship
message ReleaseShipRequest {
  string ship_symbol = 1;
  optional string reason = 2;
  optional int32 player_id = 3;
  optional string agent_symbol = 4;
}

message ReleaseShipResponse {
  string ship_symbol = 1;
}

// AssignShipFleetRequest dedicates a ship to a named fleet (sp-l7h2)
message AssignShipFleetRequest {
  string ship_symbol = 1;
  string fleet = 2;
  optional int32 player_id = 3;
  optional string agent_symbol = 4;
}

message AssignShipFleetResponse {
  string ship_symbol = 1;
  string fleet = 2;
}

// UnassignShipFleetRequest clears a ship's fleet dedication (sp-l7h2)
message UnassignShipFleetRequest {
  string ship_symbol = 1;
  optional int32 player_id = 2;
  optional string agent_symbol = 3;
}

message UnassignShipFleetResponse {
  string ship_symbol = 1;
}

// ListFleetsRequest lists every dedicated fleet and its members (sp-l7h2)
message ListFleetsRequest {
  optional int32 player_id = 1;
  optional string agent_symbol = 2;
}

message FleetShip {
  string ship_symbol = 1;
  bool idle = 2; // no active assignment and not in transit — claimable now
}

message Fleet {
  string name = 1;
  repeated FleetShip ships = 2;
}

message ListFleetsResponse {
  repeated Fleet fleets = 1;
}

// ListWaypointsRequest lists the waypoints of a system from the waypoint cache
message ListWaypointsRequest {
  string system_symbol = 1;
  optional string trait = 2;         // Optional filter: only waypoints with this trait
  optional string type = 3;          // Optional filter: only waypoints of this type
  optional int32 player_id = 4;
  optional string agent_symbol = 5;
}

message ListWaypointsResponse {
  repeated WaypointDetail waypoints = 1;
}

// GetWaypointRequest retrieves a single waypoint's detail
message GetWaypointRequest {
  string waypoint_symbol = 1;
  optional int32 player_id = 2;
  optional string agent_symbol = 3;
}

message GetWaypointResponse {
  WaypointDetail waypoint = 1;
}

message WaypointDetail {
  string symbol = 1;
  string system_symbol = 2;
  string type = 3;
  double x = 4;
  double y = 5;
  repeated string traits = 6;
  repeated string orbitals = 7;
  bool has_fuel = 8;
}

message ShipDetail {
  string symbol = 1;
  string location = 2;
  string nav_status = 3;
  int32 fuel_current = 4;
  int32 fuel_capacity = 5;
  int32 cargo_units = 6;
  int32 cargo_capacity = 7;
  repeated CargoItem cargo_inventory = 8;
  int32 engine_speed = 9;
  string role = 10;
}

// PurchaseShipRequest requests purchase of a single ship
message PurchaseShipRequest {
  string purchasing_ship_symbol = 1;
  string ship_type = 2;
  int32 player_id = 3;
  optional string agent_symbol = 4;
  optional string shipyard_waypoint = 5; // Optional - will auto-discover if not provided
}

message PurchaseShipResponse {
  string container_id = 1;
  string purchased_ship_symbol = 2;
  int32 purchase_price = 3;
  int32 agent_credits = 4;
  string status = 5;
}

// BatchPurchaseShipsRequest requests batch purchase of multiple ships
message BatchPurchaseShipsRequest {
  string purchasing_ship_symbol = 1;
  string ship_type = 2;
  int32 quantity = 3;
  int32 max_budget = 4;
  int32 player_id = 5;
  optional string agent_symbol = 6;
  optional string shipyard_waypoint = 7; // Optional - will auto-discover if not provided
  optional int32 iterations = 8; // -1 for infinite, default 1
}

message BatchPurchaseShipsResponse {
  string container_id = 1;
  int32 ships_to_purchase = 2;
  int32 max_budget = 3;
  string shipyard_waypoint = 4;
  string status = 5;
}

// GetShipyardListingsRequest requests shipyard listings
message GetShipyardListingsRequest {
  string system_symbol = 1;
  string waypoint_symbol = 2;
  int32 player_id = 3;
  optional string agent_symbol = 4;
}

message GetShipyardListingsResponse {
  repeated ShipListing listings = 1;
  string shipyard_symbol = 2;
  int32 modification_fee = 3;
}

message ShipListing {
  string ship_type = 1;
  string name = 2;
  string description = 3;
  int32 purchase_price = 4;
}

message CargoItem {
  string symbol = 1;
  string name = 2;
  int32 units = 3;
}

// RouteSegment represents a single leg of a planned route
message RouteSegment {
  string from = 1;
  string to = 2;
  string flight_mode = 3;  // CRUISE, DRIFT, BURN, STEALTH
  int32 fuel_cost = 4;
  int32 travel_time = 5;   // seconds
}

// ShipRoute contains a ship's planned route
message ShipRoute {
  string ship_symbol = 1;
  string ship_type = 2;    // "miner" or "transport"
  repeated RouteSegment segments = 3;
  int32 total_fuel = 4;
  int32 total_time = 5;    // seconds
}

// StartGoodsFactoryRequest initiates automated goods production
message StartGoodsFactoryRequest {
  int32 player_id = 1;
  string target_good = 2;
  optional string system_symbol = 3; // Optional: defaults to current system
  optional string agent_symbol = 4;
  optional int32 max_iterations = 5; // Optional: -1 for infinite, 0 or unset for single run, >0 for specific count
  bool inputs_only = 6; // If true: feed the dependency tree but do NOT harvest the fabricated output — leave it in factory stock for a construction pipeline to source
}

// StartGoodsFactoryResponse returns factory details
message StartGoodsFactoryResponse {
  string factory_id = 1;
  string target_good = 2;
  string status = 3;
  string message = 4; // e.g., "Dependency tree built, 5 nodes to process"
  int32 nodes_total = 5;
}

// StopGoodsFactoryRequest stops a factory operation
message StopGoodsFactoryRequest {
  int32 player_id = 1;
  string factory_id = 2;
}

// StopGoodsFactoryResponse confirms factory stopped
message StopGoodsFactoryResponse {
  string factory_id = 1;
  string status = 2;
  string message = 3;
}

// GetFactoryStatusRequest retrieves factory status
message GetFactoryStatusRequest {
  int32 player_id = 1;
  string factory_id = 2;
}

// GetFactoryStatusResponse returns detailed factory status
message GetFactoryStatusResponse {
  string factory_id = 1;
  string target_good = 2;
  string status = 3;
  string dependency_tree = 4; // JSON-encoded dependency tree
  int32 quantity_acquired = 5; // 0 if not yet complete
  int32 total_cost = 6;
  int32 nodes_completed = 7;
  int32 nodes_total = 8;
  string system_symbol = 9;
  int32 ships_used = 10; // Number of ships utilized
  int32 market_queries = 11; // Number of market queries performed
  int32 parallel_levels = 12; // Number of parallel execution levels
  float estimated_speedup = 13; // Estimated speedup from parallelization
}

// ScanArbitrageOpportunitiesRequest scans for arbitrage opportunities
message ScanArbitrageOpportunitiesRequest {
  int32 player_id = 1;
  string system_symbol = 2; // System to scan (e.g., "X1-AU21")
  double min_margin = 3; // Minimum profit margin percentage (default 10.0)
  int32 limit = 4; // Maximum opportunities to return (default 20)
}

// ArbitrageOpportunity represents a single arbitrage opportunity
message ArbitrageOpportunity {
  string good = 1;
  string buy_market = 2;
  string sell_market = 3;
  int32 buy_price = 4;
  int32 sell_price = 5;
  int32 profit_per_unit = 6;
  double profit_margin = 7;
  int32 estimated_profit = 8;
  double distance = 9;
  string buy_supply = 10;
  string sell_activity = 11;
  double score = 12;
}

// ScanArbitrageOpportunitiesResponse returns scan results
message ScanArbitrageOpportunitiesResponse {
  repeated ArbitrageOpportunity opportunities = 1;
  int32 total_scanned = 2;
  string system_symbol = 3;
}

// StartArbitrageCoordinatorRequest starts arbitrage coordinator
message StartArbitrageCoordinatorRequest {
  int32 player_id = 1;
  string system_symbol = 2; // System to trade in (e.g., "X1-AU21")
  double min_margin = 3; // Minimum profit margin percentage (default 10.0)
  int32 max_workers = 4; // Maximum parallel workers (default 10)
  int32 min_balance = 5; // Minimum credit balance to maintain (default 0 = no limit)
}

// StartArbitrageCoordinatorResponse returns coordinator details
message StartArbitrageCoordinatorResponse {
  string container_id = 1;
  string system_symbol = 2;
  double min_margin = 3;
  int32 max_workers = 4;
  int32 min_balance = 5;
  string status = 6;
  string message = 7;
}

// StartParallelManufacturingCoordinatorRequest starts parallel task-based manufacturing coordinator
message StartParallelManufacturingCoordinatorRequest {
  int32 player_id = 1;
  string system_symbol = 2; // System to manufacture in (e.g., "X1-AU21")
  int32 min_price = 3; // Minimum purchase price threshold (default 1000)
  int32 max_workers = 4; // Maximum parallel workers (default 5)
  int32 min_balance = 5; // Minimum credit balance to maintain (default 0 = no limit)
  int32 max_pipelines = 6; // Maximum concurrent fabrication pipelines (default 3)
  string strategy = 7; // Acquisition strategy: prefer-buy, prefer-fabricate, smart (default: prefer-fabricate)
  int32 max_collection_pipelines = 8; // Maximum concurrent collection pipelines (0 = unlimited)
}

// StartParallelManufacturingCoordinatorResponse returns coordinator details
message StartParallelManufacturingCoordinatorResponse {
  string container_id = 1;
  string system_symbol = 2;
  int32 min_price = 3;
  int32 max_workers = 4;
  int32 min_balance = 5;
  string status = 6;
  string message = 7;
  int32 max_pipelines = 8; // Maximum concurrent fabrication pipelines
  int32 max_collection_pipelines = 9; // Maximum concurrent collection pipelines (0 = unlimited)
}

// JettisonCargoRequest jettisons cargo from a ship
message JettisonCargoRequest {
  string ship_symbol = 1;
  int32 player_id = 2;
  optional string agent_symbol = 3;
  string good_symbol = 4;
  int32 units = 5;
}

// JettisonCargoResponse returns result of jettison operation
message JettisonCargoResponse {
  string container_id = 1;
  string ship_symbol = 2;
  string good_symbol = 3;
  int32 units_jettisoned = 4;
  string status = 5;
  string message = 6;
}

// StartTradeRouteRequest launches a single-hull pure-arbitrage circuit on an idle hull
message StartTradeRouteRequest {
  int32 player_id = 1;
  string ship_symbol = 2;             // Idle hull to fly the circuit
  string system_symbol = 3;           // System to scan for arbitrage lanes
  optional string agent_symbol = 4;
  optional int32 max_visits = 5;      // Safety bound on circuit visits (0 = default 50)
  // Optional lane-targeting override (sp-xwa1): a destination waypoint or
  // system symbol to pin the circuit to, instead of letting the ranker
  // auto-select a lane. Also waives the cross-system gate-crossing ranking
  // penalty for the targeted lane alone. Unset preserves the original
  // undirected auto-scan behavior unchanged.
  optional string dest_waypoint = 6;
}

// StartTradeRouteResponse returns the started trade-route container
message StartTradeRouteResponse {
  string container_id = 1;
  string ship_symbol = 2;
  string system_symbol = 3;
  string status = 4;
  string message = 5;
}

// StartArbRunRequest starts a one-shot, captain-directed, guarded arbitrage run (sp-p4ua):
// fly THIS hull on THIS lane, ONCE, safely. All caps/floors are optional guards.
message StartArbRunRequest {
  int32 player_id = 1;
  string ship_symbol = 2;              // Idle hull that must already be at buy_at
  string good = 3;                     // The good to buy at the source and sell at the destination
  string buy_at = 4;                   // Source waypoint (the hull must already be here)
  string sell_at = 5;                  // Destination waypoint (may be in another system → gate+jump+refuel)
  optional string agent_symbol = 6;
  optional int32 max_units = 7;                // Hold-cap on the tranche (0/unset = full available cargo)
  optional int32 max_spend = 8;                // Working-capital cap on the buy (0/unset = no explicit cap)
  optional int32 min_margin = 9;               // Per-unit margin floor: abort if (destBid - sourceAsk) < this
  optional int32 working_capital_reserve = 10; // Hard spend floor (0/unset = coordinator default)
}

message StartArbRunResponse {
  string container_id = 1;
  string ship_symbol = 2;
  string good = 3;
  string buy_at = 4;
  string sell_at = 5;
  string status = 6;
  string message = 7;
}

// StartTourRunRequest starts a one-shot, captain-directed, guarded multi-hop trade
// tour (sp-1ek0): fly ONE idle hull through a planner-chosen tour, guarded. All caps
// and floors are optional (0/unset = coordinator default).
message StartTourRunRequest {
  int32 player_id = 1;
  string ship_symbol = 2;                      // Idle hull to fly the tour
  optional string agent_symbol = 3;
  optional int32 max_hops = 4;                 // 0/unset = planner default (6)
  optional int64 max_spend = 5;                // 0/unset = 25% of live treasury (re-resolved per tour when iterations != 0/1)
  optional int32 min_margin = 6;               // Per-unit margin floor passed to the planner
  optional int32 replan_limit = 7;             // 0/unset = coordinator default (2), PER TOUR
  optional int64 working_capital_reserve = 8;  // Hard spend floor (0/unset = coordinator default)
  optional int32 iterations = 9;               // sp-m5kv: -1 = CONTINUOUS (tour until margins die), N>0 = N tours, 0/unset = one tour
}

message StartTourRunResponse {
  string container_id = 1;
  string ship_symbol = 2;
  string status = 3;
  string message = 4;
}

// GasExtractionOperationRequest starts a gas extraction operation with siphon and transport ships
message GasExtractionOperationRequest {
  optional string gas_giant = 1;       // Optional: specific waypoint, or auto-select
  repeated string siphon_ships = 2;    // Ships for gas siphoning (need SIPHON mount + GAS_PROCESSOR)
  repeated string transport_ships = 3; // Ships for transport to factories
  int32 player_id = 4;
  optional string agent_symbol = 5;
  bool force = 6;                      // Override fuel validation warnings
  bool dry_run = 7;                    // If true, only select gas giant without starting operation
  int32 max_leg_time = 8;              // Max time per leg in minutes (0 = no limit)
}

// GasExtractionOperationResponse returns the result of starting a gas extraction operation
message GasExtractionOperationResponse {
  string container_id = 1;
  string gas_giant = 2;
  repeated string siphon_ships = 3;
  repeated string transport_ships = 4;
  string status = 5;
  // Dry-run results
  repeated ShipRoute ship_routes = 6;    // Planned routes for all ships
  repeated string errors = 7;            // Any errors during route planning
}

// StartConstructionPipelineRequest starts a pipeline to supply materials to a construction site
message StartConstructionPipelineRequest {
  // Waypoint symbol of the construction site (e.g., "X1-FB5-I61")
  string construction_site = 1;
  // Player ID for the operation
  int32 player_id = 2;
  // Optional agent symbol (alternative to player_id)
  optional string agent_symbol = 3;
  // Supply chain depth: 0=full chain, 1=raw only, 2=intermediates, 3=buy final
  int32 supply_chain_depth = 4;
  // Maximum parallel workers (default 5)
  int32 max_workers = 5;
  // Optional system symbol (defaults to deriving from construction_site)
  optional string system_symbol = 6;
  // Optional caller-set EXPORT sourcing floor (sp-ezz9), e.g. "SCARCE".
  // Lowers the supply-priority locator's acceptance floor below the default
  // MODERATE using its existing tolerance ladder. Unset preserves the
  // original MODERATE-floor behavior unchanged.
  optional string min_supply = 7;
}

// StartConstructionPipelineResponse returns the result of starting a construction pipeline
message StartConstructionPipelineResponse {
  string pipeline_id = 1;
  string construction_site = 2;
  bool is_resumed = 3;  // true if resuming existing pipeline
  repeated ConstructionMaterial materials = 4;
  int32 task_count = 5;
  string status = 6;
  string message = 7;
  // Trade symbols of materials that could not be sourced this call (sp-560b).
  // Each still has a visible PENDING task that the SupplyMonitor re-sources
  // when supply regenerates; this names them so the operator can source the
  // gap manually instead of only seeing a generic "no market" log line.
  repeated string deferred_materials = 8;
}

// ConstructionMaterial represents a material required for construction
message ConstructionMaterial {
  string trade_symbol = 1;
  int32 required = 2;
  int32 fulfilled = 3;
  int32 remaining = 4;
  double progress = 5;
}

// GetConstructionStatusRequest retrieves the status of a construction site
message GetConstructionStatusRequest {
  string construction_site = 1;
  int32 player_id = 2;
  optional string agent_symbol = 3;
}

// GetConstructionStatusResponse returns the status of a construction site
message GetConstructionStatusResponse {
  string construction_site = 1;
  bool is_complete = 2;
  double progress = 3;
  repeated ConstructionMaterial materials = 4;
  // Pipeline info (if any)
  optional string pipeline_id = 5;
  optional string pipeline_status = 6;
  optional double pipeline_progress = 7;
}

// StopConstructionPipelineRequest cancels the active construction pipeline for a site
message StopConstructionPipelineRequest {
  string construction_site = 1;
  int32 player_id = 2;
  optional string agent_symbol = 3;
}

// StopConstructionPipelineResponse returns the result of stopping a construction pipeline
message StopConstructionPipelineResponse {
  string pipeline_id = 1;
  string construction_site = 2;
  string status = 3;         // pipeline status after cancellation (CANCELLED)
  int32 tasks_cancelled = 4;
  string message = 5;
}
