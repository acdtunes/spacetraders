syntax = "proto3";

package routing;

option go_package = "github.com/andrescamacho/spacetraders-go/pkg/proto/routing";

// RoutingService defines the gRPC API for Daemon <-> OR-Tools communication
// Provides route planning, TSP optimization, and VRP fleet partitioning
// This service runs as a separate Python process using OR-Tools library
service RoutingService {
  // PlanRoute computes optimal route with fuel constraints using Dijkstra
  rpc PlanRoute(PlanRouteRequest) returns (PlanRouteResponse);

  // OptimizeTour solves TSP for visiting multiple waypoints optimally
  rpc OptimizeTour(OptimizeTourRequest) returns (OptimizeTourResponse);

  // OptimizeFueledTour solves TSP with global fuel optimization
  // Returns visit order + flight modes + refuel stops to minimize total travel time
  rpc OptimizeFueledTour(OptimizeFueledTourRequest) returns (OptimizeFueledTourResponse);

  // PartitionFleet solves VRP to distribute waypoints across multiple ships
  rpc PartitionFleet(PartitionFleetRequest) returns (PartitionFleetResponse);

  // OptimizeTradeTour plans a depth-aware multi-hop trade tour (sp-1ek0)
  // Beam search over hop sequences + tranche allocation over the fitted
  // market-impact model. Request-carried snapshot; the service stays stateless.
  rpc OptimizeTradeTour(OptimizeTradeTourRequest) returns (OptimizeTradeTourResponse);
}

// PlanRouteRequest requests a fuel-constrained route
message PlanRouteRequest {
  // System symbol (e.g., "X1-GZ7")
  string system_symbol = 1;

  // Starting waypoint symbol
  string start_waypoint = 2;

  // Goal/destination waypoint symbol
  string goal_waypoint = 3;

  // Current fuel level
  int32 current_fuel = 4;

  // Maximum fuel capacity
  int32 fuel_capacity = 5;

  // Ship engine speed (for time calculations)
  int32 engine_speed = 6;

  // All waypoints in the system (graph nodes)
  repeated Waypoint waypoints = 7;

  // Optional: Enable fuel-efficient routing mode
  // When true, removes DRIFT penalty to allow DRIFT-assisted routes
  // Useful for mining operations where fuel preservation is important
  bool fuel_efficient = 8;

  // Optional: Prefer CRUISE mode over BURN
  // When true, routes will use CRUISE instead of BURN for fuel efficiency
  // DRIFT penalty still applies (use fuel_efficient to remove DRIFT penalty)
  bool prefer_cruise = 9;
}

message Waypoint {
  // Waypoint symbol
  string symbol = 1;

  // X coordinate in space
  double x = 2;

  // Y coordinate in space
  double y = 3;

  // Whether this waypoint has fuel available
  bool has_fuel = 4;

  // Optional: fuel price at this waypoint
  optional int32 fuel_price = 5;
}

message PlanRouteResponse {
  // Route steps in order
  repeated RouteStep steps = 1;

  // Total fuel cost for entire route
  int32 total_fuel_cost = 2;

  // Total travel time in seconds
  int32 total_time_seconds = 3;

  // Total distance traveled
  double total_distance = 4;

  // Whether route was successfully found
  bool success = 5;

  // Error message if route planning failed
  optional string error_message = 6;
}

message RouteStep {
  // Action type: "TRAVEL" or "REFUEL"
  RouteAction action = 1;

  // Waypoint symbol for this step
  string waypoint = 2;

  // Fuel cost for this step (0 for refuel actions)
  int32 fuel_cost = 3;

  // Time in seconds for this step
  int32 time_seconds = 4;

  // Distance traveled (0 for refuel actions)
  double distance = 5;

  // For REFUEL actions: amount of fuel to add
  optional int32 refuel_amount = 6;

  // Flight mode for TRAVEL actions: "BURN", "CRUISE", "DRIFT", or "STEALTH"
  optional string mode = 7;
}

enum RouteAction {
  ROUTE_ACTION_UNSPECIFIED = 0;
  ROUTE_ACTION_TRAVEL = 1;
  ROUTE_ACTION_REFUEL = 2;
}

// OptimizeTourRequest solves TSP for multiple waypoints
// A tour always returns to the starting waypoint by definition
message OptimizeTourRequest {
  // System symbol
  string system_symbol = 1;

  // Starting waypoint (ship's current location)
  string start_waypoint = 2;

  // Waypoints to visit (order to be optimized)
  repeated string target_waypoints = 3;

  // Maximum fuel capacity
  int32 fuel_capacity = 4;

  // Ship engine speed
  int32 engine_speed = 5;

  // All waypoints in system (for distance calculations)
  repeated Waypoint all_waypoints = 6;
}

message OptimizeTourResponse {
  // Optimized visit order (waypoint symbols)
  repeated string visit_order = 1;

  // Combined route with all steps (travel + refuel)
  repeated RouteStep route_steps = 2;

  // Total time for entire tour
  int32 total_time_seconds = 3;

  // Total distance traveled
  double total_distance = 4;

  // Success indicator
  bool success = 5;

  // Error message if optimization failed
  optional string error_message = 6;
}

// OptimizeFueledTourRequest solves TSP with global fuel optimization
// This endpoint jointly optimizes: visit order + flight modes + refuel stops
// to minimize total travel time while ensuring fuel feasibility
message OptimizeFueledTourRequest {
  // System symbol
  string system_symbol = 1;

  // Starting waypoint (ship's current location)
  string start_waypoint = 2;

  // Waypoints to visit (order to be optimized)
  repeated string target_waypoints = 3;

  // Optional return waypoint (default: no return)
  // Set to return to asteroid after selling
  optional string return_waypoint = 4;

  // Ship fuel specifications
  int32 current_fuel = 5;     // Current fuel level
  int32 fuel_capacity = 6;    // Maximum fuel capacity
  int32 engine_speed = 7;     // Ship engine speed

  // All waypoints in system (for distance/fuel station calculations)
  repeated Waypoint all_waypoints = 8;
}

message OptimizeFueledTourResponse {
  // Optimized visit order (waypoint symbols, not including start/return)
  repeated string visit_order = 1;

  // Individual legs with full navigation details
  repeated TourLeg legs = 2;

  // Summary totals
  int32 total_time_seconds = 3;
  int32 total_fuel_cost = 4;
  double total_distance = 5;

  // Number of refuel stops required
  int32 refuel_stops = 6;

  // Success indicator
  bool success = 7;

  // Error message if optimization failed
  optional string error_message = 8;
}

message TourLeg {
  // From waypoint symbol
  string from_waypoint = 1;

  // To waypoint symbol (the market/target)
  string to_waypoint = 2;

  // Flight mode: "BURN", "CRUISE", or "DRIFT"
  string flight_mode = 3;

  // Fuel cost for this leg
  int32 fuel_cost = 4;

  // Travel time in seconds
  int32 time_seconds = 5;

  // Distance traveled
  double distance = 6;

  // Whether to refuel BEFORE departing this leg
  bool refuel_before = 7;

  // If refuel_before is true, how much fuel to add
  optional int32 refuel_amount = 8;

  // Intermediate waypoints for multi-hop legs (refuel stops)
  repeated IntermediateStop intermediate_stops = 9;
}

message IntermediateStop {
  // Waypoint symbol (must be a fuel station)
  string waypoint = 1;

  // Flight mode TO this stop
  string flight_mode = 2;

  // Fuel cost to reach this stop
  int32 fuel_cost = 3;

  // Travel time to this stop
  int32 time_seconds = 4;

  // Fuel to add at this stop
  int32 refuel_amount = 5;
}

// PartitionFleetRequest solves VRP for multiple ships
message PartitionFleetRequest {
  // System symbol
  string system_symbol = 1;

  // Ship symbols to partition work across
  repeated string ship_symbols = 2;

  // Market waypoints to visit
  repeated string market_waypoints = 3;

  // Ship configurations (location, fuel, speed)
  map<string, ShipConfig> ship_configs = 4;

  // All waypoints in system
  repeated Waypoint all_waypoints = 5;

  // Number of iterations (for repeated tours). Use -1 for infinite.
  int32 iterations = 6;
}

message ShipConfig {
  // Current location of the ship
  string current_location = 1;

  // Fuel capacity
  int32 fuel_capacity = 2;

  // Engine speed
  int32 engine_speed = 3;

  // Current fuel level
  int32 current_fuel = 4;
}

message PartitionFleetResponse {
  // Ship assignments (ship_symbol -> tour)
  map<string, ShipTour> assignments = 1;

  // Success indicator
  bool success = 2;

  // Error message if partitioning failed
  optional string error_message = 3;

  // Statistics
  int32 total_waypoints_assigned = 4;
  int32 ships_utilized = 5;
}

message ShipTour {
  // Waypoints assigned to this ship (in visit order)
  repeated string waypoints = 1;

  // Complete route with steps
  repeated RouteStep route_steps = 2;

  // Total time for this ship's tour
  int32 total_time_seconds = 3;

  // Total distance for this ship's tour
  double total_distance = 4;
}

// --- sp-1ek0: multi-hop trade-tour optimizer ---

// MarketGoodSnapshot is one (waypoint, good) row of the request-carried
// market snapshot the Go daemon assembles from the scout cache.
message MarketGoodSnapshot {
  string waypoint_symbol = 1;
  string system_symbol = 2;
  string good_symbol = 3;
  int32 ask = 4;            // what we pay to buy (sellPrice in Go domain)
  int32 bid = 5;            // what market pays us (purchasePrice)
  int32 trade_volume = 6;
  string supply = 7;        // SCARCE..ABUNDANT
  string activity = 8;      // WEAK..RESTRICTED
  int64 observed_at_unix = 9;
}

// TourShip carries the touring hull's position, capacity and current cargo.
message TourShip {
  string ship_symbol = 1;
  string current_waypoint = 2;
  string current_system = 3;
  int32 hold_capacity = 4;
  int32 fuel_current = 5;
  int32 fuel_capacity = 6;
  int32 engine_speed = 7;
  repeated TourCargoItem cargo = 8;
}

message TourCargoItem { string good_symbol = 1; int32 units = 2; }

// TourConstraints binds the solver: hop budget, money guards, system scope.
message TourConstraints {
  int32 max_hops = 1;              // default 6
  int64 max_spend = 2;
  int32 min_margin_per_unit = 3;
  int64 working_capital_reserve = 4;
  repeated string allowed_systems = 5;   // gate-adjacent candidate systems
  int32 max_snapshot_age_minutes = 6;    // 75
  string expected_model_version = 7;     // "1@<era>"; mismatch -> error
  // max_tour_systems is the per-tour cap on DISTINCT systems the tour may touch,
  // INCLUDING the ship's start system (sp-syaz, epic sp-fguo). It promotes the
  // solver's hard MAX_TOUR_SYSTEMS module constant to the wire so the Go caller /
  // replay harness can sweep tour length with no redeploy. 0/unset (the proto3
  // int32 default) => the solver falls back to that module default (2), so a caller
  // that never sets it is byte-identical to today (the default-safety hinge).
  int32 max_tour_systems = 8;
}

// TourTrade is one buy or sell tranche at a leg (execution order preserved).
message TourTrade {
  string good_symbol = 1;
  int32 units = 2;
  bool is_buy = 3;
  int32 expected_unit_price = 4;   // curve-adjusted
  // is_deposit marks a SELL-side tranche that is a haul-to-storage DEPOSIT into
  // the home warehouse (sp-dchv Lane C), not a market sale. expected_unit_price
  // is the synthetic bid (= home_ask, the contract-savings value the deposit
  // sink was priced at), NOT a market price — the executor deposits via
  // ReserveSpace/TransferCargo/ConfirmDeposit and books ZERO revenue, and skips
  // the live-price re-verify (there is no market bid to drift against). is_buy is
  // always false for a deposit. Additive to the m5kv sell/launch-liquidation
  // shape (a deposit is a sell-with-no-buy whose "revenue" is inventory value,
  // not cash); existing sell semantics untouched.
  bool is_deposit = 5;
  // is_stock marks a BUY-side tranche that is a WITHDRAWAL of factory output from
  // warehouse stock at cost basis (C1, sp-64je), not a market purchase.
  // expected_unit_price is the recorded cost basis (the flat source price the stock
  // pool was priced at), NOT a market ask — the executor withdraws via
  // TryReserveCargo/TransferCargo/ConfirmTransfer instead of buying, and books the
  // acquisition at basis. is_buy is true for a stock withdrawal (it acquires cargo);
  // is_deposit is always false. Additive to the deposit shape (a stock draw is a
  // buy-with-no-market-spend whose "cost" is the sunk basis); existing buy semantics
  // untouched — an old executor ignoring field 6 treats it as a normal buy at
  // expected_unit_price, which is the basis, so it still never overpays.
  bool is_stock = 6;
}

// TradeTourLeg is one market stop of the planned tour.
// (Named TradeTourLeg because TourLeg is already taken by OptimizeFueledTour.)
message TradeTourLeg {
  string waypoint_symbol = 1;
  string system_symbol = 2;
  repeated TourTrade trades = 3;
  int64 projected_leg_profit = 4;
  int32 travel_seconds_from_prev = 5;
}

// RejectedTour is one of the top alternative tours the solver declined,
// with a one-line reason (observability parity with lane-selection logs).
message RejectedTour { string summary = 1; string reason = 2; }

// TourWaypoint carries coordinates for one distinct market waypoint in the
// snapshot so the planner prices travel time for real (harbormaster
// amendment 2026-07-09: flat travel defaults gut the $/hr denominator).
// Assembled Go-side from the waypoints table; missing/empty list -> the
// solver falls back to flat named defaults with a logged warning.
message TourWaypoint {
  string symbol = 1;
  string system_symbol = 2;
  int32 x = 3;
  int32 y = 4;
}

// DepositCandidate is one home-warehouse pre-positioning offer (sp-dchv Lane C):
// a good the contract history recurrently needs, which is cheaper in a reachable
// foreign system, may be DEPOSITED into the home warehouse instead of arb-sold.
// The Go daemon assembles these from the Lane A demand miner + the running
// warehouse op, capped Go-side by remaining contract demand, remaining warehouse
// space, and the pre-positioning capital ceiling (10% of live treasury, fail
// closed). The solver treats (storage_waypoint, good_symbol) as a synthetic SINK
// with a flat bid = synthetic_bid (no depth decay — an inventory transfer has no
// market price impact — and no A-cap), absorbing at most units_wanted units, and
// prices deposit legs against real arb sells so hold space goes to whichever
// earns more (the emergent opportunity-cost property).
message DepositCandidate {
  string good_symbol = 1;
  int32 units_wanted = 2;      // max units the sink absorbs (Go-side demand/space/ceiling cap)
  int32 synthetic_bid = 3;     // flat sink price = home_ask (the contract-savings value)
  string storage_waypoint = 4; // the warehouse hull's waypoint (the sink node)
  string storage_system = 5;   // system the warehouse is in (home; makes the sink routable)
}

// MarketAbsorption is the outstanding cross-container depth already committed at one
// (waypoint, good, side) pool that the solver NETS out of that market's available
// depth (sp-78ai L3). The Go daemon assembles these from the absorption ledger at plan
// assembly time — decaying EXECUTED recovery shadows on the fitted half-life curve
// Go-side, so the solver stays clock-free and the recovery curve is consumed in exactly
// one place. Two quantities with DIFFERENT netting semantics (design §2, the
// price-honesty split):
//   - units_planned: in-flight PLANNED reservations from OTHER containers. The market
//     cache is still pre-absorption, so these both CONSUME tranche capacity AND ADVANCE
//     the price schedule — the plan's first tranche at that sink prices at the decayed
//     step those earlier tranches leave behind, because someone is taking them there.
//   - units_recovering: the decayed EXECUTED recovery residual. The cache ALREADY shows
//     the crushed quote, so these consume tranche CAPACITY ONLY — pricing still starts
//     at the live quote's step 0, or the crush would be double-counted.
// Empty (the pre-sp-78ai shape) → no netting; the solver plans against full depth,
// byte-identical to today. Additive-field precedent (sp-bc27/sp-dchv): an old solver
// ignores field 6 and behaves exactly as it does now (version-skew safe).
message MarketAbsorption {
  string waypoint_symbol = 1;
  string good_symbol = 2;
  string side = 3;               // "sell" | "buy" (absorption.SideSell / SideBuy)
  int32 units_planned = 4;       // in-flight PLANNED — advance price schedule + consume capacity
  double units_recovering = 5;   // decayed EXECUTED residual — consume capacity ONLY
}

// StockSource is one planner-visible-stock offer (C1, sp-64je): factory output
// deposited into a warehouse at a recorded cost basis that the tour may WITHDRAW
// instead of buying our own output at the laddered market ask. The mirror image of
// DepositCandidate — a zero-ask SOURCE rather than a synthetic sink. The Go daemon
// assembles these from the running warehouse op: units_available is the on-hand
// stock net of outstanding cross-tour reservations, unit_ask is the weighted-average
// cost basis. The solver treats (storage_waypoint, good_symbol) as a flat BUY pool
// priced at unit_ask (no depth decay — a withdrawal has no market price impact — and
// no A-cap, bounded by units_available), and prices withdrawal legs against real
// market buys on margin so the tour draws from stock only when it is the cheaper
// acquisition (the export-ask-subsidy inversion becomes structurally impossible).
message StockSource {
  string good_symbol = 1;
  int32 units_available = 2;   // reservable on-hand stock (Go-side: available minus outstanding reservations)
  int32 unit_ask = 3;          // flat source price = recorded cost basis
  string storage_waypoint = 4; // the warehouse hull's waypoint (the source node)
  string storage_system = 5;   // system the warehouse is in (makes the source routable)
}

message OptimizeTradeTourRequest {
  repeated MarketGoodSnapshot snapshot = 1;
  TourShip ship = 2;
  TourConstraints constraints = 3;
  repeated TourWaypoint waypoints = 4;
  // deposit_candidates offers haul-to-storage sinks (sp-dchv Lane C). Empty (the
  // pre-sp-dchv shape) → no deposit legs, the solver plans pure arb unchanged.
  repeated DepositCandidate deposit_candidates = 5;
  // absorption carries per-(waypoint,good,side) outstanding cross-container depth the
  // solver nets out of available tranche capacity (sp-78ai L3). Empty (the pre-sp-78ai
  // shape) → no netting, plans against full depth unchanged.
  repeated MarketAbsorption absorption = 6;
  // stock_sources offers warehouse stock as zero-ask-at-basis withdrawal sources
  // (C1, sp-64je). Empty (the pre-C1 shape) → no stock legs, the solver plans against
  // market buys unchanged. Additive-field precedent (sp-dchv/sp-78ai): an old solver
  // ignores field 7 and behaves exactly as it does now (version-skew safe).
  repeated StockSource stock_sources = 7;
}

message OptimizeTradeTourResponse {
  bool feasible = 1;
  string infeasible_reason = 2;
  repeated TradeTourLeg legs = 3;
  int64 projected_profit = 4;
  double projected_credits_per_hour = 5;
  repeated RejectedTour top_rejected = 6;
  string model_version = 7;
  // held_liquidation is the portion of projected_profit that is REVENUE from
  // selling cargo already aboard at plan time (m5kv launch-liquidation legs:
  // sell tranches with no paired buy leg — buy_leg=None in the solver). It has
  // NO acquisition cost in this plan, so it inflates the projected margin used
  // for display. projected_profit stays the TOTAL (fresh-trade profit + this):
  // total ranks tour SELECTION so pure-liquidation tours remain feasible/
  // plannable (Admiral ruling C, sp-bc27). This field is REPORTING-only — it
  // lets a projection show fresh profit (projected_profit - held_liquidation)
  // and liquidation revenue apart, and leaves the door open to re-weight
  // selection later without re-plumbing the wire.
  int64 held_liquidation = 8;
  // deposit_value is the portion of projected_profit that is SYNTHETIC savings
  // value from haul-to-storage DEPOSIT legs (sp-dchv Lane C): sum of
  // units*synthetic_bid over deposit tranches, where synthetic_bid = home_ask.
  // It is NOT cash — a deposit books zero revenue in the executor's realized
  // P&L; the value is realized later when a contract sources the good from
  // inventory at zero ask. projected_profit stays the TOTAL (fresh cash arb +
  // this synthetic savings) so the solver ranks deposit legs against real arb
  // sells; this field lets the planned-manifest log report fresh cash profit
  // (projected_profit - held_liquidation - deposit_value) apart from the
  // synthetic pre-positioning value (mirrors held_liquidation, sp-bc27).
  int64 deposit_value = 9;
}
